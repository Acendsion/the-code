document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

solid var(--ink);\n  display:flex; align-items:center; justify-content:center; flex:0 0 auto;\n  background:transparent; cursor:pointer; transition:background .25s,color .25s;}\n.circ svg{width:18px; height:18px; stroke:var(--ink); stroke-width:1.8; fill:none;}\n.circ:hover{background:var(--ink);} .circ:hover svg{stroke:var(--bg);}\n.pill{border:1.3px solid var(--ink); border-radius:var(--r-pill);\n  padding:9px 20px 8px; font-size:var(--t-label); font-weight:600;\n  letter-spacing:.08em; text-transform:uppercase; white-space:nowrap; line-height:1;}\n.tb-topic{font-size:var(--t-label); font-weight:500; letter-spacing:.02em; color:var(--grey-mid);\n  text-transform:uppercase;}\n.tb-r{display:flex; align-items:center; gap:26px;}\n.tb-copy{font-size:var(--t-micro); letter-spacing:.1em; text-transform:uppercase; color:var(--grey-mid);}\n.tb-pos{font-size:var(--t-label); font-weight:600; letter-spacing:.05em; font-variant-numeric:tabular-nums;}\n.tb-pos b{font-weight:700;}\n/* dark theme chrome */\n[data-theme=\"dark\"] .circ{border-color:var(--dark-ink);}\n[data-theme=\"dark\"] .circ svg{stroke:var(--dark-ink);}\n[data-theme=\"dark\"] .circ:hover{background:var(--dark-ink);} [data-theme=\"dark\"] .circ:hover svg{stroke:var(--dark-bg);}\n[data-theme=\"dark\"] .pill{border-color:var(--dark-ink);}\n[data-theme=\"dark\"] .tb-topic,[data-theme=\"dark\"] .tb-copy{color:#9b988f;}\n\n/* ---------- typography helpers ---------- */\n.kicker{font-size:var(--t-label); font-weight:600; letter-spacing:.14em; text-transform:uppercase; color:var(--grey-mid);}\nh1.big{font-size:var(--t-h1); font-weight:700; line-height:1.02; letter-spacing:-.02em; text-wrap:balance;}\nh2.mid{font-size:var(--t-h2); font-weight:700; line-height:1.05; letter-spacing:-.015em;}\n.muted{color:var(--grey);}\n[data-theme=\"dark\"] .muted{color:#6f6c64;}\n.lead{font-size:var(--t-lead); line-height:1.4; font-weight:400; letter-spacing:-.005em;}\np{ text-wrap:pretty; }\n.bodytext{font-size:var(--t-body); line-height:1.5;}\n.bodytext.sm{font-size:var(--t-body-sm); line-height:1.55;}\n.col-text p + p{margin-top:.7em;}\nstrong,b{font-weight:700;}\n.divider{height:1.3px; background:var(--grey-line); border:0; width:100%;}\n[data-theme=\"dark\"] .divider{background:var(--d-line);}\n\n/* ---------- section divider slide ---------- */\n.sec-num{position:absolute; right:var(--pad); top:96px; font-size:var(--t-secnum);\n  font-weight:700; line-height:.8; letter-spacing:-.03em; color:var(--dark-ink);}\n.sec-name{position:absolute; left:var(--pad); bottom:var(--pad); font-size:var(--t-secname);\n  font-weight:700; line-height:.92; letter-spacing:-.03em; display:flex; align-items:flex-end; gap:34px;}\n.sec-pill{position:absolute; left:var(--pad); top:120px;}\n.sec-desc{position:absolute; right:var(--pad); bottom:calc(var(--pad) + 6px); width:560px; text-align:right;\n  font-size:23px; line-height:1.5; color:#b8b5ac;}\n.sec-circ{width:62px; height:62px;}\n.sec-circ svg{width:24px;height:24px;}\n\n/* ---------- cards ---------- */\n.card{background:var(--card); border-radius:var(--r); padding:38px;}\n.card.d{background:var(--d-card); color:var(--dark-ink);}\n[data-theme=\"dark\"] .card{background:var(--d-card);}\n.numcard{background:var(--card); border-radius:var(--r); padding:34px; display:flex; flex-direction:column; justify-content:space-between;}\n.numcard .n{font-size:120px; font-weight:700; line-height:.9; letter-spacing:-.03em;}\n.numcard .t{font-size:var(--t-h3); font-weight:600;}\n\n/* product callout */\n.product{border:1.4px solid var(--ink); border-radius:var(--r); padding:32px 36px; position:relative;\n  background:transparent; display:flex; gap:22px; align-items:flex-start;}\n.product .diam{width:16px; height:16px; flex:0 0 auto; background:var(--ink); transform:rotate(45deg); margin-top:9px;}\n.product .ptext{font-size:var(--t-body-sm); line-height:1.5;}\n.product .ptext b{font-weight:700;}\n[data-theme=\"dark\"] .product{border-color:var(--d-line);}\n[data-theme=\"dark\"] .product .diam{background:var(--dark-ink);}\n\n/* ---------- tables ---------- */\ntable.t{width:100%; border-collapse:collapse; font-variant-numeric:tabular-nums;}\ntable.t thead th{font-size:var(--t-label); font-weight:700; letter-spacing:.07em; text-transform:uppercase;\n  text-align:left; padding:0 22px 16px 0; color:var(--grey-mid); border-bottom:1.4px solid var(--ink);}\ntable.t tbody td{font-size:var(--t-body-sm); padding:17px 22px 17px 0; vertical-align:top; border-bottom:1.2px solid var(--grey-line);\n  line-height:1.4;}\ntable.t tbody tr:last-child td{border-bottom:0;}\ntable.t td.lead-cell{font-weight:700;}\ntable.t.compact tbody td{font-size:24px; padding:13px 18px 13px 0;}\n[data-theme=\"dark\"] table.t thead th{border-color:var(--dark-ink); color:#9b988f;}\n[data-theme=\"dark\"] table.t tbody td{border-color:var(--d-line);}\n\n/* checklist */\n.checkcol{column-gap:60px;}\n.checkitem{display:flex; gap:16px; align-items:flex-start; padding:11px 0; break-inside:avoid;}\n.checkitem .box{width:26px;height:26px;border:1.6px solid var(--ink);border-radius:6px;flex:0 0 auto;margin-top:3px;}\n.checkitem .ct{font-size:23px; line-height:1.35;}\n.checkgroup-h{font-size:var(--t-label); font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--grey-mid); margin-bottom:8px;}\n\n/* contents */\n.contents-panel{background:var(--d-card); border-radius:26px; padding:20px 40px;}\n.contents-row{display:flex; align-items:center; gap:30px; padding:26px 0; border-bottom:1px solid var(--d-line); cursor:pointer; transition:padding-left .25s;}\n.contents-row:last-child{border-bottom:0;}\n.contents-row:hover{padding-left:14px;}\n.contents-row .cpill{border:1.2px solid var(--dark-ink); color:var(--dark-ink); border-radius:var(--r-pill); padding:8px 18px; font-size:var(--t-micro); letter-spacing:.08em; text-transform:uppercase; font-weight:600; white-space:nowrap;}\n.contents-row .ctitle{font-size:30px; font-weight:600; color:var(--dark-ink); letter-spacing:.01em; flex:1;}\n.contents-row .cnum{font-size:26px; color:#8b887f; font-variant-numeric:tabular-nums;}\n\n/* generic layout utils */\n.stack{display:flex; flex-direction:column;}\n.grid{display:grid;}\n.gap-l{gap:40px;} .gap-m{gap:28px;} .gap-s{gap:18px;}\n.fill{height:100%;}\n\n/* ============ fixed page chrome (outside scaled stage) ============ */\n.progress{position:fixed; left:0; bottom:0; height:3px; background:var(--ink); width:0; z-index:60; transition:width .45s cubic-bezier(.2,.7,.2,1); opacity:.55;}\n\n/* ============ soft-UI (neumorphic) chrome tokens — light default, dark on dark slides ============ */\n:root{\n  --nu-surface:linear-gradient(145deg,#fcfbf8,#e3e1d9);\n  --nu-shadow:-5px -5px 11px rgba(255,255,255,.9), 6px 7px 15px rgba(20,18,14,.18);\n  --nu-shadow-h:-6px -6px 13px rgba(255,255,255,.95), 7px 9px 18px rgba(20,18,14,.22);\n  --nu-shadow-sm:-3px -3px 7px rgba(255,255,255,.85), 3px 4px 9px rgba(20,18,14,.2);\n  --nu-shadow-sm-h:-4px -4px 9px rgba(255,255,255,.9), 4px 5px 11px rgba(20,18,14,.24);\n  --nu-press:inset 2px 2px 5px rgba(20,18,14,.22), inset -2px -2px 5px rgba(255,255,255,.8);\n  /* recessed / debossed wells — dark inner shadow top-left, light inner highlight bottom-right */\n  --nu-well:#e9e7e0;\n  --nu-inset:inset 3px 3px 6px rgba(20,18,14,.27), inset -3px -3px 6px rgba(255,255,255,.92);\n  --nu-inset-h:inset 4px 4px 8px rgba(20,18,14,.33), inset -3px -3px 7px rgba(255,255,255,.95);\n  --nu-inset-sm:inset 2px 2px 4px rgba(20,18,14,.27), inset -2px -2px 4px rgba(255,255,255,.9);\n  --nu-inset-sm-h:inset 3px 3px 6px rgba(20,18,14,.33), inset -2px -2px 5px rgba(255,255,255,.93);\n  --nu-inset-deep:inset 4px 4px 9px rgba(20,18,14,.42), inset -2px -2px 5px rgba(255,255,255,.9);\n  --nu-rim:rgba(20,18,14,.10);\n  --nu-ink:#2a2824; --nu-ink-soft:rgba(42,40,36,.5);\n  /* clean light-surface button (light variant — for light/gradient slides) */\n  --peb-face:linear-gradient(180deg,#f7f6f2 0%,#ecebe4 100%);\n  --peb-rim:rgba(20,18,14,.12);\n  --peb-shadow:0 1px 2px rgba(28,26,20,.10), 0 4px 12px rgba(28,26,20,.10), inset 0 1px 0 rgba(255,255,255,.9);\n  --peb-shadow-h:0 1px 2px rgba(28,26,20,.12), 0 5px 14px rgba(28,26,20,.13), inset 0 1px 0 rgba(255,255,255,.95);\n  --peb-press:inset 0 2px 5px rgba(28,26,20,.22), inset 0 -1px 1px rgba(255,255,255,.6);\n}\nbody.chrome-dark{\n  --nu-surface:linear-gradient(145deg,#262523,#0b0b0a);\n  --nu-shadow:-5px -5px 12px rgba(255,255,255,.05), 7px 8px 18px rgba(0,0,0,.62);\n  --nu-shadow-h:-6px -6px 14px rgba(255,255,255,.06), 8px 10px 20px rgba(0,0,0,.66);\n  --nu-shadow-sm:-3px -3px 7px rgba(255,255,255,.045), 3px 4px 10px rgba(0,0,0,.6);\n  --nu-shadow-sm-h:-4px -4px 9px rgba(255,255,255,.06), 4px 5px 12px rgba(0,0,0,.64);\n  --nu-press:inset 2px 2px 5px rgba(0,0,0,.6), inset -2px -2px 5px rgba(255,255,255,.05);\n  --nu-well:#0c0c0b;\n  --nu-inset:inset 3px 3px 6px rgba(0,0,0,.68), inset -3px -3px 6px rgba(255,255,255,.06);\n  --nu-inset-h:inset 4px 4px 8px rgba(0,0,0,.74), inset -3px -3px 7px rgba(255,255,255,.07);\n  --nu-inset-sm:inset 2px 2px 4px rgba(0,0,0,.66), inset -2px -2px 4px rgba(255,255,255,.05);\n  --nu-inset-sm-h:inset 3px 3px 6px rgba(0,0,0,.72), inset -2px -2px 5px rgba(255,255,255,.06);\n  --nu-inset-deep:inset 4px 4px 9px rgba(0,0,0,.82), inset -2px -2px 5px rgba(255,255,255,.05);\n  --nu-rim:rgba(255,255,255,.07);\n  --nu-ink:#e7e4dc; --nu-ink-soft:rgba(231,228,220,.5);\n  /* clean deep-charcoal button (dark variant — matches reference: flat deep face, subtle edge) */\n  --peb-face:linear-gradient(180deg,#2a2a2c 0%,#19191a 58%,#0f0f10 100%);\n  --peb-rim:rgba(255,255,255,.10);\n  --peb-shadow:0 4px 14px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.10), inset 0 -3px 6px rgba(0,0,0,.5);\n  --peb-shadow-h:0 5px 16px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.12), inset 0 -3px 6px rgba(0,0,0,.55);\n  --peb-press:inset 0 2px 6px rgba(0,0,0,.7), inset 0 -1px 1px rgba(255,255,255,.12);\n}\n\n/* button group: Contents + nav arrows, dynamical /* flatten the two inline groups so brand / pills / arrow are direct flex items */\n  section[data-label=\"Title\"] .frame > div:first-child > div{ display:contents !important; }\n  /* forced line break between the arrow row and the pills row */\n  section[data-label=\"Title\"] .frame > div:first-child::after{\n    content:\"\" !important; order:2 !important; flex-basis:100% !important; height:0 !important;\n  }\n  /* ◆ ACENDSION wordmark — smaller */\n  section[data-label=\"Title\"] .frame > div:first-child > div:first-child > span:first-child{\n    order:0 !important; font-size:17px !important; gap:9px !important;\n  }\n  section[data-label=\"Title\"] .frame > div:first-child > div:first-child > span:first-child > span{\n    width:10px !important; height:10px !important;\n  }\n  /* round arrow — pushed to the right edge of line 1 */\n  section[data-label=\"Title\"] .frame > div:first-child .circ{ order:1 !important; margin-left:auto !important; }\n  /* both pills sit together on line 2 (equal order keeps their DOM order) */\n  section[data-label=\"Title\"] .frame > div:first-child .pill{\n    order:3 !important; font-size:10px !important; padding:6px 13px 5px !important;\n  }\n\n  /* ---------------- type overrides (class / inline-px not on vars) ---------------- */\n  .statement{ font-size:28px !important; line-height:1.13 !important; }\n  .numbig{ font-size:36px !important; }\n  .q-mark{ font-size:58px !important; }\n  .numcard .n{ font-size:44px !important; }\n  .statrow .sv{ font-size:32px !important; }\n  .statrow .sl{ font-size:13px !important; }\n  h1[style*=\"font-size:96px\"]{ font-size:34px !important; }\n  .frame span[style*=\"font-size:40px\"]{ font-size:22px !important; }\n  .contents-panel{ padding:12px 22px !important; }\n  .contents-row{ gap:16px !important; padding:16px 0 !important; }\n  .contents-row .ctitle{ font-size:18px !important; }\n  .contents-row .cnum{ font-size:14px !important; }\n  /* THE CODE CONTENTS lists (Parts 1–2 / 3–5) use inline 21–22px — bring them onto the\n     standard mobile body scale so they follow the same red thread as every other slide */\n  section[data-topic=\"Contents\"] ol{ font-size:var(--t-body) !important; line-height:1.7 !important; }\n  section[data-topic=\"Contents\"] ol li{ font-size:var(--t-body) !important; }\n  .proto-label{ font-size:19px !important; }\n  .proto-body{ font-size:15px !important; }\n  .proto-body.sm{ font-size:14px !important; }\n  .feat .fi-label{ font-size:18px !important; margin-bottom:6px !important; }\n  .feat .fi-body{ font-size:15px !important; }\n  .card{ padding:20px !important; }\n  .numcard{ padding:20px !important; }\n  .product{ padding:18px 20px !important; gap:14px !important; }\n  .product .diam{ margin-top:5px !important; }\n\n  /* round arrow buttons scaled down on mobile (title + section dividers) */\n  .circ{ width:38px !important; height:38px !important; }\n  .circ svg{ width:15px !important; height:15px !important; }\n  .sec-circ{ width:48px !important; height:48px !important; }\n  .sec-circ svg{ width:19px !important; height:19px !important; }\n\n  /* ---- enforce ONE body/label scale inside boxes (overrides inline px like 20/23px) ---- */\n  :is(.card,.numcard,.product,.contents-panel) :is(p,.bodytext,.bodytext.sm,.fi-body,.ptext,li,.ct){\n    font-size:var(--t-body) !important; line-height:1.5 !important;\n  }\n  :is(.card,.numcard,.product,.contents-panel) :is(.checkgroup-h,.fi-label,.kicker){\n    font-size:var(--t-label) !important; line-height:1.3 !important; letter-spacing:.12em !important;\n  }\n\n  /* ---------------- tables: horizontal-scroll wrapper ---------------- */\n  .m-tablewrap{\n    display:block !important; width:100%; max-width:100%;\n    overflow-x:auto; -webkit-overflow-scrolling:touch;\n  }\n  .m-tablewrap>table.t{ margin:0 !important; min-width:540px; }\n  .m-tablewrap>table.t.compact{ min-width:620px; }\n  table.t thead th{ font-size:11px !important; padding-bottom:12px !important; }\n  table.t tbody ared after the gesture) */\n@media (hover:none){\n  .card:hover::after,.numcard:hover::after,.product:hover::after,\n  .contents-panel:hover::after,.topbar .pill:hover::after,\n  .menu-toggle:hover::after,.botbar button:hover::after{ opacity:0; animation:none; }\n  .contents-row:hover{ padding-left:0; }\n  .menu-sub a:hover{ padding-left:4px; color:var(--ink); }\n\n  .card.m-tap::after,.numcard.m-tap::after,.product.m-tap::after,\n  .contents-panel.m-tap::after,.topbar .pill.m-tap::after{\n    opacity:1 !important; animation:traceflow 3s linear infinite !important;\n  }\n  .menu-toggle.m-tap::after,.botbar button.m-tap::after{\n    opacity:1 !important; animation:goldspin 2.4s linear infinite !important;\n  }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<deck-stage width=\"1920\" height=\"1080\" no-rail=\"\">\n<!-- ============================== FRONT MATTER ============================== -->\n\n<!-- TITLE -->\n<section data-theme=\"dark\" data-nobar=\"\" data-label=\"Title\">\n  <div class=\"frame\">\n    <div style=\"position:absolute;left:var(--pad);right:var(--pad);top:48px;display:flex;justify-content:space-between;align-items:center;\">\n      <div style=\"display:flex;align-items:center;gap:18px;\">\n        <span style=\"display:flex;align-items:center;gap:11px;font-size:24px;font-weight:700;letter-spacing:.04em;\"><span style=\"width:13px;height:13px;background:var(--dark-ink);transform:rotate(45deg);display:inline-block;\"><\u002Fspan>ACENDSION<\u002Fspan>\n        <span class=\"pill\">The Protocol<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;\">\n        <span class=\"pill\">Looks · Gym · Confidence<\u002Fspan>\n        <button class=\"circ js-next\"><svg viewBox=\"0 0 24 24\"><path d=\"M8 8l8 8M16 16V9M16 16H9\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:var(--pad);bottom:236px;\">\n      <div class=\"kicker\" data-anim=\"\" style=\"-- g:-.01em;\">Confidence<\u002Fspan><\u002Fdiv>\n      <ol style=\"list-style:none;margin-top:14px;font-size:21px;line-height:1.8;color:#3a3833;\">\n        <li>Why Confidence Changes Everything<\u002Fli><li>Posture &amp; Body Language: The Complete Protocol<\u002Fli><li>Eye Contact Mastery<\u002Fli><li>Vocal Presence: How You Sound Matters<\u002Fli><li>The Psychology of Presence &amp; State Control<\u002Fli><li>Social Calibration &amp; First Impressions<\u002Fli><li>Style Fundamentals: Dress Like You Mean It<\u002Fli><li>Building a Capsule Wardrobe<\u002Fli><li>Social Skills: Conversation, Networking &amp; Dating<\u002Fli><li>The Confidence Feedback Loop<\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div data-anim=\"\" style=\"--d:2;\">\n      <div style=\"display:flex;align-items:baseline;gap:12px;border-bottom:1.4px solid var(--ink);padding-bottom:14px;\"><span class=\"kicker\">Part 5<\u002Fspan><span style=\"font-size:28px;font-weight:700;letter-spacing:-.01em;\">The System<\u002Fspan><\u002Fdiv>\n      <ol style=\"list-style:none;margin-top:14px;font-size:21px;line-height:1.8;color:#3a3833;\">\n        <li>Your Daily Blueprint: Morning to Night<\u002Fli><li>Your First Week: Day by Day<\u002Fli><li>The 12-Week Transformation Timeline<\u002Fli><li>Tracking Progress &amp; Staying Accountable<\u002Fli><li>The Ascend Checklist<\u002Fli><li>Mental Health &amp; Mindset<\u002Fli><li>Final Words<\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ A LETTER FROM US ============ -->\n\n<!-- LETTER 1 -->\n<section data-section=\"The Code\" data-topic=\"A Letter From Us\" data-label=\"A Letter From Us\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">A Letter From Us<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:20px;\">Our Commitment<br>To You<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"lead\" data-anim=\"\" style=\"--d:1;font-weight:600;max-width:22ch;\">We know where you are right now. We know, because we were there too.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:60ch;\">Maybe you have tried before. Maybe you downloaded a workout plan that lasted two weeks. Maybe you bought a skincare product that ended up collecting dust. Maybe you told yourself Monday would be different — and it was, for a few days. We have been there. Every single one of us. And we are telling you, from the other side: it does not have to be that way.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LETTER 2 -->\n<section data-section=\"The Code\" data-topic=\"A Letter From Us\" data-theme=\"dark\" data-label=\"Built To Be Complete\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"statement\" data-anim=\"\" style=\"max-width:17ch;\">THE CODE is not another thing to try. It is designed to be complete — so you stop assembling fragments and start executing.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;margin-top:44px;max-width:74ch;color:#c9c6bd;\">We are not saying this to sell you something — we are saying this because we built it from the ground up to eliminate every excuse, every gap, every question mark that made previous attempts fall apart. Every protocol. Every detail. Every meal. Every rep. Every drop of serum. It is all here.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LETTER 3 -->\n<section data-section=\"The Code\" data-topic=\"A Letter From Us\" data-label=\"Twelve Weeks From Now\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">The Commitment<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:20px;\">Twelve weeks<br>from now.<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Here is our commitment: if you follow this document — actually follow it, not skim it — you can expect real change over 12 weeks. Not because of magic. Because of systems. When you stack sleep, nutrition, training, skincare, and confidence into one unified daily protocol, the compound effect is something most men who stay consistent come to experience.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:26px;max-width:60ch;\">We are not telling you you'll become a different person. The aim is simpler: to help you become the version of yourself that was always possible — the one that got buried under bad habits, conflicting advice, and the lie that some men just have it and others do not. That is not how it works. It is a system. And systems are built to deliver for the men who follow them consistently.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LETTER 4 — weeks 2/4/6 -->\n<section data-section=\"The Code\" data-topic=\"On The Other Side\" data-label=\"On The Other Side · 2–6\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\" style=\"max-width:24ch;\">What your life can look like <span class=\"muted\">on the other side.<\u002Fspan><\u002Fh2>\n    <div class=\"cardrow\" data-anim=\"\" style=\"--d:1;margin-top:46px;\">\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Week 2<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">You can wake up with energy you did not have before. Your skin starts to feel different under your fingers. You hit the gym without negotiating with yourself. The routine is still new, but it is already becoming part of who you are.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Week 4<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">People often start noticing. Your clothes can fit better. You walk taller without thinking about it. Your skin is often visibly clearing. You feel sharper, more focused, more present in conversations.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Week 6<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">You catch your reflection and something has shifted. The guy staring back can look like someone who has his life together — because the work is showing. Compliments often come unprompted. You start to understand what compound progress feels like.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LETTER 5 — weeks 8/10/12 -->\n<section data-section=\"The Code\" data-topic=\"On The Other Side\" data-theme=\"dark\" data-label=\"On The Other Side · 8–12\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\" style=\"max-width:24ch;\">The compound effect, <span class=\"muted\">week by week.<\u002Fspan><\u002Fh2>\n    <div class=\"cardrow\" data-anim=\"\" style=\"--d:1;margin-top:46px;\">\n      <div class=\"card\"><div class=\"kicker\" style=\"color:#9b988f;\">Week 8<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">Your body can be changing shape. Your face is leaner. Your skin is clearer and more even. Conversations feel easier. Doors can open that were not open before — professionally, socially, romantically. Confidence is no longer something you perform. It is something you feel.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:#9b988f;\">Week 10<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">You can be stronger than you have ever been. Your physique draws attention. Your grooming is dialed. Your posture commands respect. You carry yourself differently, and people respond to it.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:#9b988f;\">Week 12<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:18px;\">You may barely recognize the person from 12 weeks ago. Not because you became someone else — because you finally stopped settling for less than what you are capable of. This is the version of yourself the work is built to reveal. And the change shows.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LETTER 6 — close -->\n<section data-section=\"The Code\" data-topic=\"A Letter From Us\" data-label=\"This Is A System\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">The Only Variable<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:20px;\">This is<br>a system.<\u002Fh1>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:26px;max-width:30ch;\">Not a hope — a structured protocol. And systems like this are built to deliver for the men who follow them consistently.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">We built THE CODE so that no man ever has to piece together fragments of information from a hundred different sources again. This is the one document. The complete system. The only variable left is whether you decide to execute.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:26px;max-width:58ch;\">We already know you will. That is why you are here.<\u002Fp>\n      <hr class=\"divider\" data-anim=\"\" style=\"--d:3;margin-top:36px;max-width:58ch;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:4;margin-top:22px;font-weight:700;\">— The Acendsion team<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ INTRODUCTION ============ -->\n\n<!-- INTRO 1 -->\n<section data-section=\"The Code\" data-topic=\"Introduction\" data-label=\"Before You Begin\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">Introduction · Before You Begin<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:26px;max-width:20ch;font-size:74px;\">A complete operating system for who you are becoming.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:36px;max-width:70ch;\">You are holding the single most comprehensive protocol we have ever built. This is not a collection of tips. This is not a surface-level guide. This is a complete operating system for transforming your body, your face, and how you carry yourself through the world.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTRO 2 -->\n<section data-section=\"The Code\" data-topic=\"Introduction\" data-label=\"Five Of Us\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">About Us<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:20px;\">From the<br>founder.<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Why trust us? Because we've been where you are. I was the guy nobody noticed. So I went all in — gym, skin, diet, routine. It worked. Doors opened. Every Acendsion formula is built on researched ingredients, for men done guessing. The system I wish I'd had — now yours. /Isak, Founder of Acendsion<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTRO 3 — four pillars -->\n<section data-section=\"The Code\" data-topic=\"Introduction\" data-label=\"Three Pillars + Foundation\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\" style=\"max-width:26ch;\">Three pillars. <span class=\"muted\">One foundation beneath them all.<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;margin-top:30px;max-width:72ch;\">THE CODE is built on three pillars: Gym, Looks, and Confidence. But beneath all three sits a fourth — the Foundation — because none of the pillars hold up without sleep, nutrition, and hormonal health.<\u002Fp>\n    <div class=\"statrow\" data-anim=\"\" style=\"--d:2;margin-top:46px;\">\n      <div><div class=\"sv\">01<\u002Fdiv><div class=\"sl\">Foundation — sleep, nutrition, hormones<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"sv\">02<\u002Fdiv><div class=\"sl\">Gym — evidence-based training<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"sv\">03<\u002Fdiv><div class=\"sl\">Looks — skincare &amp; grooming<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"sv\">04<\u002Fdiv><div class=\"sl\">Confidence — presence &amp; state<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:3;margin-top:34px;max-width:74ch;color:var(--grey-mid);\">Every recommendation in this protocol is grounded in peer-reviewed research. Where the science is evolving, we tell you. Where there is consensus, we give you the exact protocol. No fluff. No filler. Just what works. Follow this document from start to finish, execute with discipline, and over 12 weeks of consistent effort you can transform how you look, feel, and carry yourself. Not because of luck. Because of a system.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTRO 4 — quote -->\n<section data-section=\"The Code\" data-topic=\"Introduction\" data-theme=\"dark\" data-label=\"Time To Ascend\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"q-mark\" data-anim=\"\">“<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:6px;max-width:20ch;font-size:78px;\">The best time to start was yesterday. The second best time is right now.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:40px;font-weight:600;color:#c9c6bd;\">Welcome to THE CODE. Time to ascend.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================================================================== -->\n<!-- ============================ PART 1 ================================= -->\n<!-- ==================================================================== -->\n\n<!-- DIVIDER -->\n<section data-theme=\"dark\" data-nobar=\"\" data-part=\"1\" data-partname=\"Foundation\" data-divider=\"1\" data-label=\"01 · Foundation\">\n  <div class=\"sec-pill\"><span class=\"pill\">Section 1<\u002Fspan><\u002Fdiv>\n  <div class=\"sec-num\" data-anim=\"\">01<\u002Fdiv>\n  <div class=\"sec-name\" data-anim=\"\" style=\"--d:1;\">Foundation <button class=\"circ js-next sec-circ\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 8l-8 8M8 8h8v8\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n  <div class=\"sec-desc\" data-anim=\"\" style=\"--d:2;\">Everything you do in the gym, everything you apply to your skin, every ounce of confidence you project — it all sits on top of these fundamentals. Skip this section and you are building on sand. This is where 90% of men fail: they chase advanced strategies while ignoring the basics that make those strategies work.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- SLEEP 1 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Sleep\" data-label=\"Sleep · The Anabolic Window\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Sleep<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">The anabolic window you waste <span class=\"muted\">every night.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Sleep is not rest. Sleep is when your body builds. During deep sleep (stages 3 and 4 of NREM), your pituitary gland releases up to 75% of your daily growth hormone output. Growth hormone drives muscle protein synthesis, fat metabolism, and skin cell turnover — the three outcomes that define your transformation. Miss this window and no amount of training or skincare will compensate.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:24px;max-width:60ch;\">Research consistently shows that sleeping fewer than 7 hours per night reduces testosterone levels by 10–15% in healthy young men. A 2011 study published in JAMA demonstrated that restricting sleep to 5 hours per night for just one week produced testosterone levels equivalent to someone 10–15 years older. This is not marginal — this is the difference between a hormonal environment that builds muscle, burns fat, and regenerates skin, and one that does the opposite.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SLEEP 2 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Sleep · Every System Depends On It\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\" style=\"max-width:26ch;\">Every system in your body <span class=\"muted\">depends on adequate sleep.<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 64px;margin-top:40px;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:54ch;\">Sleep also governs insulin sensitivity (poor sleep increases insulin resistance, promoting fat storage), leptin and ghrelin regulation (sleep deprivation increases hunger hormones by up to 28%), cognitive function (reaction time, decision-making, willpower), and immune function (sleep-deprived individuals are 4.2x more likely to catch a cold).<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;max-width:54ch;\">Your skin regenerates primarily during sleep. Collagen production, cell turnover, and blood flow to the skin all peak during deep sleep phases. Chronic sleep deprivation visibly accelerates skin aging — studies show that poor sleepers have increased fine lines, uneven pigmentation, reduced elasticity, and slower wound healing.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SLEEP PROTOCOL 1 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep · The Protocol\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Sleep Protocol · Duration, Consistency, Temperature\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The Protocol <span class=\"muted\">/ 1<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:38px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Duration<\u002Fdiv><div class=\"proto-body\">7.5–9 hours per night. The exact amount varies by individual, but the research consensus is that fewer than 7 hours impairs recovery, hormone production, and cognitive function. Most men need 7.5–8.5 hours. Track your sleep for two weeks without an alarm to find your natural duration — the time you naturally wake feeling rested is your target.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Consistency<\u002Fdiv><div class=\"proto-body\">Go to bed and wake up within a 30-minute window every single day, including weekends. Your circadian rhythm depends on regularity. Research from Harvard Medical School shows that irregular sleep schedules suppress melatonin production, fragment deep sleep phases, and dysregulate cortisol rhythms. Social jet lag (sleeping in on weekends) is as damaging as actual sleep deprivation.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Temperature<\u002Fdiv><div class=\"proto-body\">Keep your bedroom between 16–19°C (60–67°F). Core body temperature must drop by approximately 1°C to initiate sleep. A cool room accelerates this process. Consider a warm shower or bath 60–90 minutes before bed — it paradoxically cools you down by pulling blood to the skin surface, accelerating heat dissipation. Research shows this can reduce sleep onset latency by up to 36%.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SLEEP PROTOCOL 2 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep · The Protocol\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Sleep Protocol · Light, Caffeine, Alcohol\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The Protocol <span class=\"muted\">/ 2<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:38px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Light exposure<\u002Fdiv><div class=\"proto-body\">Eliminate blue light 60–90 minutes before bed. Blue wavelengths (450–495 nm) suppress melatonin production by up to 50%. Use blue-light-blocking glasses (amber or red lenses) if screens are unavoidable. In the morning, get 10–15 minutes of direct sunlight within 30 minutes of waking — this anchors your circadian clock, improves cortisol awakening response, and enhances sleep onset 14–16 hours later.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Caffeine cutoff<\u002Fdiv><div class=\"proto-body\">No caffeine after 14:00. Caffeine has a half-life of 5–6 hours, meaning half the caffeine from a 14:00 coffee is still in your system at 20:00. Even if you fall asleep without difficulty, caffeine reduces deep sleep duration by up to 20% — which is the exact phase when growth hormone is released. If you are sensitive to caffeine, cut off at noon.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Alcohol<\u002Fdiv><div class=\"proto-body\">Alcohol is the single most destructive substance for sleep quality. Even 1–2 drinks eliminates REM sleep, fragments sleep architecture, increases nighttime awakenings, and suppresses growth hormone release by up to 75%. Alcohol also dehydrates the skin, increases cortisol, and impairs muscle protein synthesis by 37%. If transformation is your goal, alcohol has no place in your protocol.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SLEEP PROTOCOL 3 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep · The Protocol\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Sleep Protocol · Nutrition, Supplements, Environment\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The Protocol <span class=\"muted\">/ 3<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:34px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Pre-sleep nutrition<\u002Fdiv><div class=\"proto-body sm\">Avoid large meals within 2–3 hours of bed — digestion diverts blood away from peripheral tissues and can elevate core temperature. However, a small snack containing casein protein (slow-digesting) or magnesium-rich foods (pumpkin seeds, dark chocolate, almonds) can support overnight muscle protein synthesis without disrupting sleep onset.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Supplements for sleep<\u002Fdiv><div class=\"proto-body sm\">Magnesium glycinate (200–400 mg, 30–60 minutes before bed) is the most evidence-backed sleep supplement. It activates the parasympathetic nervous system, binds to GABA receptors (the calming neurotransmitter), and reduces cortisol. Research published in the Journal of Research in Medical Sciences showed that magnesium supplementation significantly improved sleep quality scores in elderly subjects. Avoid melatonin as a daily supplement — it is a hormone, not a vitamin, and exogenous use can downregulate your body's natural production over time.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Sleep environment<\u002Fdiv><div class=\"proto-body sm\">Complete darkness — even small amounts of light (from LEDs, streetlights) can suppress melatonin through the eyelids. Use blackout curtains or a quality sleep mask. White noise or earplugs if your environment is noisy. Remove your phone from the bedroom entirely if possible — the temptation to check it disrupts both sleep onset and sleep continuity.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LIVER SUPPORT PRODUCT -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sleep · Product\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Product · Liver Support\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">The Product Stack<\u002Fdiv>\n    <h2 class=\"mid\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Liver Support<\u002Fh2>\n    <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:36px;max-width:1100px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\">Our <b>Liver Support<\u002Fb> formula contains key compounds that support overnight detoxification and metabolic recovery — the processes that happen while you sleep. Your liver processes toxins, metabolizes hormones, and regulates blood sugar overnight. Many men underestimate how liver health impacts sleep quality, morning energy, and skin clarity.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- NUTRITION INTRO -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Nutrition\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Nutrition: Fueling the Machine\" data-label=\"Nutrition · Fueling the Machine\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Nutrition<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Fueling the machine.<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Your body cannot build what it does not have the materials for. Every muscle fiber, every skin cell, every hormone molecule is constructed from the nutrients you consume. Nutrition is not a supplement to training — it is the raw material that makes training productive. Without proper nutrition, your workouts are wasted stimulus.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:24px;max-width:60ch;\">The fitness industry has made nutrition unnecessarily complicated. There are only three things you need to understand and execute: total calories (energy balance), protein (building material), and food quality (micronutrients, gut health, hormonal support). Master these three and you master your body composition.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CALORIES + TABLE -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Calories · The Energy Equation\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Calories · The Energy Equation\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Calories <span class=\"muted\">— the energy equation<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:20px;max-width:96ch;color:var(--grey-mid);\">Whether you gain or lose weight is determined entirely by energy balance — calories in versus calories out. There is no way around this thermodynamic reality, regardless of what any diet guru claims. To build muscle, you need a caloric surplus. To lose fat, you need a deficit. To recompose — build muscle while losing fat, which is slower but possible — you need to be near maintenance with very high protein and consistent progressive overload in the gym.<\u002Fp>\n    <table class=\"t\" data-anim=\"\" style=\"--d:2;margin-top:30px;\">\n      <thead><tr><th style=\"width:18%;\">Goal<\u002Fth><th style=\"width:24%;\">Calorie target<\u002Fth><th style=\"width:16%;\">Timeline<\u002Fth><th style=\"width:24%;\">Expected result<\u002Fth><th style=\"width:18%;\">Protein priority<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Lean bulk<\u002Ftd><td>+200 to +350 kcal surplus<\u002Ftd><td>12–16 weeks<\u002Ftd><td>0.25–0.5% BW gain/week<\u002Ftd><td>1.6–2.0 g/kg/day<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Maintenance cut<\u002Ftd><td>-400 to -600 kcal deficit<\u002Ftd><td>8–12 weeks<\u002Ftd><td>0.5–0.75% BW loss/week<\u002Ftd><td>2.0–2.4 g/kg/day<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Recomposition<\u002Ftd><td>Maintenance ± 100 kcal<\u002Ftd><td>Ongoing<\u002Ftd><td>Slow gain, slow fat loss<\u002Ftd><td>2.0–2.2 g/kg/day<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Aggressive cut<\u002Ftd><td>-700 to -1000 kcal deficit<\u002Ftd><td>4–6 weeks max<\u002Ftd><td>Fast fat loss, some muscle risk<\u002Ftd><td>2.2–2.6 g/kg/day<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MAINTENANCE METHOD -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Calories · Finding Maintenance\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Calories · Finding Maintenance\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">How to find your maintenance<\u002Fdiv>\n    <p class=\"lead\" data-anim=\"\" style=\"--d:1;margin-top:24px;max-width:30ch;font-weight:600;\">Bodyweight in kg × 28–32.<\u002Fp>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:28px;max-width:78ch;\">Multiply your bodyweight in kg by 28–32 (28 if sedentary/desk job, 30 if moderately active, 32 if very active/physical job). This gives you an estimated maintenance calorie intake. Track your weight daily for 2 weeks eating at this level, and take weekly averages. If your weekly average stays stable (within ±0.3 kg), you have found maintenance. If you are gaining, reduce by 100–200 kcal. If losing, add 100–200 kcal. From this baseline, adjust for your goal.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROTEIN 1 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Protein\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Macronutrients In Detail\" data-label=\"Protein · The Non-Negotiable\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Macronutrients<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Protein — the non-negotiable macronutrient.<\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Protein is the single most important macronutrient for body composition. It provides the amino acids your body needs to build and repair muscle tissue, produce hormones and enzymes, and maintain skin, hair, and nail health.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:60ch;\">A 2018 meta-analysis by Morton et al. published in the British Journal of Sports Medicine — analyzing 49 studies with 1,863 participants — established that 1.6 g/kg/day is the average point of diminishing returns for muscle protein synthesis when combined with resistance training. We recommend 1.6–2.2 g/kg/day to ensure you are covered under all conditions (high training volume, caloric deficit, individual genetic variation in protein utilization).<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROTEIN 2 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Protein · Timing &amp; Sources\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Protein · Timing, Sources, Leucine\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Timing, sources <span class=\"muted\">&amp; the leucine threshold<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:36px;\">\n      <div><div class=\"fi-label\">Timing &amp; distribution<\u002Fdiv><div class=\"fi-body\">Distribute protein evenly across 3–5 meals, aiming for at least 0.4 g/kg per meal (roughly 30–50 g for most men). Research by Schoenfeld and Aragon (2018) shows this distribution maximizes the muscle protein synthesis response throughout the day, because each meal triggers a 3–5 hour MPS elevation. A protein-rich meal or shake within 2 hours post-training supports recovery, though the so-called anabolic window is much wider than the old 30-minute myth suggested. What matters most is total daily intake.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Sources ranked by quality<\u002Fdiv><div class=\"fi-body\">Whey protein isolate has the highest leucine content and fastest absorption — ideal post-workout. Whole eggs provide the most complete amino acid profile plus healthy fats and choline. Chicken breast is the leanest high-volume source. Greek yogurt combines protein with probiotics. Fatty fish (salmon, mackerel) provides protein plus omega-3s. Lean beef offers creatine, iron, zinc, and B12. Plant-based proteins (tofu, tempeh, lentils, pea protein) work but require 20–30% higher total intake due to lower digestibility scores.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:30px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\"><b>Leucine threshold —<\u002Fb> leucine is the key amino acid that triggers the mTOR signaling pathway, the molecular switch for muscle protein synthesis. Each meal should contain at least 2.5–3 g of leucine to maximally stimulate MPS. Whey protein, eggs, and dairy easily hit this threshold; plant sources typically require larger servings or combining multiple sources. <b>Our Chocolate Whey Protein Isolate<\u002Fb> delivers 25 g of protein per serving with high leucine content, fast absorption, and minimal fat and lactose — third-party tested for purity and potency.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FATS + CARBS -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Fats &amp; Carbohydrates\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Fats &amp; Carbohydrates\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Fats <span class=\"muted\">&amp; carbohydrates<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:36px;\">\n      <div><div class=\"fi-label\">Fats — hormonal fuel<\u002Fdiv><div class=\"fi-body\">Consume at least 0.7–1.0 g/kg/day from whole food sources. Dietary fat is absolutely essential for testosterone production — the Leydig cells in the testes require cholesterol (derived from dietary fat) as the precursor for testosterone synthesis. Very low-fat diets (below 20% of total calories) reduce total testosterone by 10–15% and free testosterone by even more. Prioritize monounsaturated fats (olive oil, avocado, macadamia nuts), omega-3 fatty acids (fatty fish 2–3x per week, or 2–3 g combined EPA+DHA daily), and moderate saturated fat from whole foods. Eliminate trans fats completely.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Carbohydrates — training fuel<\u002Fdiv><div class=\"fi-body\">Fill the remaining calories after protein and fat with carbohydrates. Carbs are not the enemy — they are the primary fuel for high-intensity resistance training. Glycogen is depleted during training and must be replenished for optimal performance and recovery. Carbs also support thyroid function (T3 conversion), serotonin production (mood and sleep), and insulin-mediated amino acid uptake into muscle cells. Prioritize complex, minimally processed sources: oats, rice, potatoes, sweet potatoes, fruits, legumes, and whole grains. Time your highest-carb meals around your training window.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MICRONUTRIENTS INTRO + TABLE A -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Micronutrients\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Micronutrients &amp; Supplementation\" data-label=\"Micronutrients · The Critical Gaps\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Micronutrients <span class=\"muted\">&amp; supplementation<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:18px;max-width:104ch;color:var(--grey-mid);\">A well-balanced diet covers most micronutrient needs, but certain deficiencies are extremely common in young men — especially those who train intensely — and directly impact performance, hormone production, and appearance. The following are the most critical:<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n      <thead><tr><th style=\"width:17%;\">Nutrient<\u002Fth><th style=\"width:34%;\">Why it matters<\u002Fth><th style=\"width:26%;\">Optimal intake<\u002Fth><th style=\"width:23%;\">Best sources<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Vitamin D3<\u002Ftd><td>Testosterone production, immune function, bone density, mood regulation<\u002Ftd><td>2000–5000 IU/day (get blood levels tested; target 40–60 ng/mL)<\u002Ftd><td>Sunlight (15–20 min midday), fatty fish, egg yolks, supplement<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Zinc<\u002Ftd><td>Testosterone synthesis, skin wound healing, immune function, protein synthesis<\u002Ftd><td>15–30 mg/day (do not exceed 40 mg)<\u002Ftd><td>Oysters, red meat, pumpkin seeds, chickpeas<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Magnesium<\u002Ftd><td>Sleep quality, muscle relaxation, 300+ enzymatic reactions, nervous system<\u002Ftd><td>200–400 mg/day as glycinate or threonate<\u002Ftd><td>Dark chocolate, spinach, almonds, avocado<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Omega-3 (EPA/DHA)<\u002Ftd><td>Systemic inflammation reduction, skin barrier integrity, brain function, joint health<\u002Ftd><td>2–3 g combined EPA+DHA daily<\u002Ftd><td>Fatty fish 2–3x/week or high-quality fish oil<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MICRONUTRIENTS TABLE B -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Micronutrients\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Micronutrients · K2, Creatine, B-Complex\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The critical gaps <span class=\"muted\">/ continued<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <thead><tr><th style=\"width:17%;\">Nutrient<\u002Fth><th style=\"width:34%;\">Why it matters<\u002Fth><th style=\"width:26%;\">Optimal intake<\u002Fth><th style=\"width:23%;\">Best sources<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Vitamin K2<\u002Ftd><td>Directs calcium to bones (not arteries), synergy with vitamin D3<\u002Ftd><td>100–200 mcg/day as MK-7 form<\u002Ftd><td>Natto, egg yolks, hard cheeses, supplement<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Creatine monohydrate<\u002Ftd><td>Muscle strength +5–10%, power output, cell hydration, cognitive benefits<\u002Ftd><td>3–5 g/day every day (no loading required)<\u002Ftd><td>Supplement only (food sources provide &lt;1 g/day)<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">B-complex vitamins<\u002Ftd><td>Energy metabolism, red blood cell production, nervous system function<\u002Ftd><td>RDA levels via diet or supplement<\u002Ftd><td>Whole grains, eggs, leafy greens, meat<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MICRONUTRIENT PRODUCTS -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Micronutrients · Products\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Product · The Daily Foundation\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">The Product Stack<\u002Fdiv>\n    <h2 class=\"mid\" data-anim=\"\" style=\"--d:1;margin-top:16px;\">Your nutritional insurance.<\u002Fh2>\n    <div class=\"stack gap-s\" data-anim=\"\" style=\"--d:2;margin-top:32px;\">\n      <div class=\"product\"><span class=\"diam\"><\u002Fspan><div class=\"ptext\">Our <b>Complete Multivitamin<\u002Fb> is formulated to fill the exact gaps most common in active men — including vitamin D3, zinc, magnesium, B-complex, and K2 in their most bioavailable forms. One daily dose covers your nutritional insurance so you can focus on food quality for everything else.<\u002Fdiv><\u002Fdiv>\n      <div class=\"product\"><span class=\"diam\"><\u002Fspan><div class=\"ptext\">Our <b>Creatine Monohydrate<\u002Fb> is the single most studied and effective legal supplement for strength and muscle gain. 5 g daily saturates intramuscular phosphocreatine stores, increasing power output by 5–10% and supporting greater training volume over time. Take it every day — timing does not matter. Mix with water or your protein shake.<\u002Fdiv><\u002Fdiv>\n      <div class=\"product\"><span class=\"diam\"><\u002Fspan><div class=\"ptext\">Our <b>Probiotic with Prebiotics<\u002Fb> supports gut health — the invisible foundation behind visible results. Your gut microbiome directly impacts nutrient absorption efficiency, skin clarity (gut-skin axis), immune function, systemic inflammation, and even mood and motivation via the gut-brain axis. A healthy gut means your food actually becomes the building blocks your body needs.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HYDRATION -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Hydration\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Hydration\" data-label=\"Hydration · The Largest Organ Shows It First\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Hydration<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">2% is all it takes <span class=\"muted\">to break performance.<\u002Fspan><\u002Fh1>\n      <div class=\"statrow\" data-anim=\"\" style=\"--d:2;margin-top:40px;\">\n        <div><div class=\"sv\">5–10%<\u002Fdiv><div class=\"sl\">Strength drop at 2% dehydration<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"sv\">35–40<\u002Fdiv><div class=\"sl\">ml per kg bodyweight, minimum, daily<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Dehydration of just 2% of body mass impairs both physical performance (strength drops 5–10%, endurance drops 20–30%) and cognitive performance (reaction time, concentration, mood). Your skin — the largest organ in your body — shows dehydration before anything else: dullness, increased fine line visibility, slower wound healing, increased sensitivity.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:58ch;\">Aim for a minimum of 35–40 ml per kg of bodyweight daily (roughly 2.5–3.5 liters for most men), and add 500–1000 ml extra on training days and in hot climates. Spread intake throughout the day rather than drinking large volumes at once — your kidneys can only process about 800–1000 ml per hour. Add a pinch of sea salt or electrolytes to your first glass of the morning to support sodium-potassium balance after overnight dehydration.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MEAL PLAN — LEAN BULK -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sample Meal Plans\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Sample Meal Plans\" data-label=\"Meal Plan · Lean Bulk\">\n  <div class=\"body\">\n    <div style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\" data-anim=\"\">\n      <h2 class=\"mid\">Lean Bulk<\u002Fh2>\n      <span class=\"bodytext sm\" style=\"color:var(--grey-mid);\">~2,800 kcal &nbsp;·&nbsp; 160 g P &nbsp;·&nbsp; 85 g F &nbsp;·&nbsp; 340 g C &nbsp;·&nbsp; designed for an 80 kg male<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:10%;\">Time<\u002Fth><th style=\"width:62%;\">Food<\u002Fth><th style=\"width:9%;\">P<\u002Fth><th style=\"width:9%;\">C<\u002Fth><th style=\"width:9%;\">F<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">7:00<\u002Ftd><td>4 whole eggs scrambled + 2 slices sourdough + 1/2 avocado + spinach<\u002Ftd><td>28g<\u002Ftd><td>40g<\u002Ftd><td>28g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">10:00<\u002Ftd><td>Greek yogurt 200g + 30g granola + banana + honey<\u002Ftd><td>18g<\u002Ftd><td>55g<\u002Ftd><td>6g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">13:00<\u002Ftd><td>150g chicken breast + 200g white rice + mixed veg + olive oil<\u002Ftd><td>45g<\u002Ftd><td>75g<\u002Ftd><td>12g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">16:00<\u002Ftd><td>Oats 80g + whey scoop + 15g peanut butter<\u002Ftd><td>30g<\u002Ftd><td>58g<\u002Ftd><td>10g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">18:30<\u002Ftd><td>Whey isolate 1.5 scoops + banana (post-workout)<\u002Ftd><td>38g<\u002Ftd><td>30g<\u002Ftd><td>2g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">20:00<\u002Ftd><td>200g salmon + 250g sweet potato + broccoli + lemon<\u002Ftd><td>40g<\u002Ftd><td>55g<\u002Ftd><td>18g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">22:00<\u002Ftd><td>150g cottage cheese + 20g almonds<\u002Ftd><td>22g<\u002Ftd><td>6g<\u002Ftd><td>14g<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MEAL PLAN — CUT -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sample Meal Plans\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Meal Plan · Cut\">\n  <div class=\"body\">\n    <div style=\"display:flex;align-items:baseline;gap:24px;flex-wrap:wrap;\" data-anim=\"\">\n      <h2 class=\"mid\">Cut<\u002Fh2>\n      <span class=\"bodytext sm\" style=\"color:var(--grey-mid);\">~2,100 kcal &nbsp;·&nbsp; 175 g P &nbsp;·&nbsp; 60 g F &nbsp;·&nbsp; 180 g C &nbsp;·&nbsp; designed for an 80 kg male<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:10%;\">Time<\u002Fth><th style=\"width:62%;\">Food<\u002Fth><th style=\"width:9%;\">P<\u002Fth><th style=\"width:9%;\">C<\u002Fth><th style=\"width:9%;\">F<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">7:00<\u002Ftd><td>3 egg whites + 1 whole egg + 1 slice toast + spinach + tomato<\u002Ftd><td>22g<\u002Ftd><td>15g<\u002Ftd><td>7g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">10:00<\u002Ftd><td>Whey shake + 1 apple<\u002Ftd><td>27g<\u002Ftd><td>25g<\u002Ftd><td>2g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">13:00<\u002Ftd><td>180g chicken breast + 150g rice + large mixed salad<\u002Ftd><td>48g<\u002Ftd><td>50g<\u002Ftd><td>8g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">16:00<\u002Ftd><td>3 rice cakes + 20g PB + whey scoop (pre-workout)<\u002Ftd><td>28g<\u002Ftd><td>30g<\u002Ftd><td>12g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">18:30<\u002Ftd><td>Whey isolate 1 scoop in water (post-workout)<\u002Ftd><td>25g<\u002Ftd><td>2g<\u002Ftd><td>1g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">20:00<\u002Ftd><td>200g white fish + large veg portion + 5ml olive oil<\u002Ftd><td>42g<\u002Ftd><td>15g<\u002Ftd><td>8g<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">22:00<\u002Ftd><td>Casein shake or 150g Greek yogurt<\u002Ftd><td>25g<\u002Ftd><td>8g<\u002Ftd><td>3g<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MEAL PREP STRATEGY -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Sample Meal Plans\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Meal Prep · The Separating Habit\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">Meal Prep Strategy<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:24px;max-width:22ch;font-size:64px;\">The habit that separates men who hit their targets from men who do not.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:34px;max-width:76ch;\">Cook protein and carbs in bulk twice weekly (Sunday and Wednesday). Store in portioned containers. This eliminates daily decisions and ensures you never miss a meal out of inconvenience.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SUPPLEMENT TIMING A -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Supplement Timing\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Supplement Timing Protocol\" data-label=\"Supplement Timing · Morning to Training\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Supplement timing <span class=\"muted\">protocol<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:16px;max-width:100ch;color:var(--grey-mid);\">Timing matters for some supplements and not for others. Here is the evidence-based schedule for everything recommended in THE CODE.<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <thead><tr><th style=\"width:20%;\">Supplement<\u002Fth><th style=\"width:20%;\">When<\u002Fth><th style=\"width:20%;\">With what<\u002Fth><th style=\"width:40%;\">Why<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Multivitamin<\u002Ftd><td>Morning<\u002Ftd><td>Breakfast (with fat)<\u002Ftd><td>Fat-soluble vitamins need dietary fat for absorption<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Omega-3 fish oil<\u002Ftd><td>Morning<\u002Ftd><td>Breakfast (with fat)<\u002Ftd><td>Fat improves EPA/DHA absorption 3x; reduces aftertaste<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Creatine 5g<\u002Ftd><td>Any time daily<\u002Ftd><td>Water or shake<\u002Ftd><td>Daily saturation matters, not acute timing<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Vitamin D3<\u002Ftd><td>Morning<\u002Ftd><td>Breakfast (with fat)<\u002Ftd><td>Fat-soluble; avoids potential sleep interference<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Pre-workout<\u002Ftd><td>15–30 min pre-training<\u002Ftd><td>Water<\u002Ftd><td>Caffeine peaks at 30–60 min; citrulline needs 15–30 min<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SUPPLEMENT TIMING B -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Supplement Timing\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Supplement Timing · Recovery to Sleep\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Supplement timing <span class=\"muted\">/ continued<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <thead><tr><th style=\"width:20%;\">Supplement<\u002Fth><th style=\"width:22%;\">When<\u002Fth><th style=\"width:18%;\">With what<\u002Fth><th style=\"width:40%;\">Why<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Magnesium glycinate<\u002Ftd><td>30–60 min before bed<\u002Ftd><td>Water<\u002Ftd><td>Promotes GABA activation and relaxation for sleep<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Probiotic<\u002Ftd><td>Morning, 15 min pre-food<\u002Ftd><td>Water only<\u002Ftd><td>Empty stomach — bacteria survive gastric acid better<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Whey protein<\u002Ftd><td>Post-workout / between meals<\u002Ftd><td>Water or milk<\u002Ftd><td>Fast absorption for rapid amino acid delivery<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Liver support<\u002Ftd><td>Evening with dinner<\u002Ftd><td>Food<\u002Ftd><td>Supports overnight detox processes during sleep<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hormone support<\u002Ftd><td>Before bed (3 caps)<\u002Ftd><td>Water<\u002Ftd><td>Supports overnight hormonal recovery and testosterone<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STRESS & CORTISOL INTRO -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Stress &amp; Cortisol\" data-theme=\"dark\" data-part=\"1\" data-partname=\"Foundation\" data-menu=\"Stress, Cortisol &amp; Hormonal Balance\" data-label=\"Cortisol · The Antithesis\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Stress, Cortisol &amp; Hormonal Balance<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:20ch;font-size:72px;\">Cortisol is the antithesis of everything you are trying to build.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:32px;max-width:96ch;color:#c9c6bd;\">Chronically elevated cortisol — from poor sleep, overtraining, chronic psychological stress, or excessive stimulant use — directly suppresses testosterone production via the HPA axis, increases visceral and subcutaneous fat storage, accelerates muscle protein breakdown, degrades collagen in the skin, impairs immune function, reduces insulin sensitivity, and disrupts sleep architecture. It is the single most destructive hormone for your transformation goals when chronically elevated.<\u002Fp>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:3;margin-top:20px;max-width:96ch;color:#c9c6bd;\">Managing cortisol is not about eliminating stress. Acute stress (like a hard training session or a cold shower) is productive — it triggers adaptive responses. The problem is chronic, unresolved stress — the kind that keeps your sympathetic nervous system activated for hours and days on end without adequate recovery periods.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CORTISOL MANAGEMENT 1 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Cortisol Management\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Cortisol Management · Train, Sunlight, Alcohol\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Evidence-based <span class=\"muted\">cortisol management / 1<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:34px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Train hard but recover harder<\u002Fdiv><div class=\"proto-body sm\">Limit high-intensity resistance training to 4–5 sessions per week with at least 1–2 full rest days. Overtraining syndrome is a clinically documented condition — it elevates resting cortisol, suppresses testosterone and immune function, causes chronic fatigue, mood disturbances, and complete stagnation of progress. More training volume is only productive when you can recover from it.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Morning sunlight exposure<\u002Fdiv><div class=\"proto-body sm\">10–15 minutes of direct morning sunlight within 30 minutes of waking regulates your HPA axis (the hypothalamic-pituitary-adrenal stress response system) and improves cortisol rhythmicity — meaning cortisol peaks sharply in the morning (when you need alertness and energy) and drops progressively through the evening (when you need to wind down and sleep). This is one of the most powerful free interventions for hormonal health.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Limit alcohol<\u002Fdiv><div class=\"proto-body sm\">Beyond its devastating effects on sleep, alcohol directly increase
