even or brittle. Clean hands and nails signal hygiene and attention to detail.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- GROOMING 2 -->\n<section data-section=\"Part 3 · Looks · Grooming\" data-topic=\"Grooming\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Grooming · Fragrance &amp; Beard\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Fragrance <span class=\"muted\">&amp; facial hair<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:28px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Fragrance<\u002Fdiv><div class=\"proto-body sm\">A signature scent is a powerful identity anchor — scent is the sense most strongly linked to memory and emotion. Apply to pulse points (wrists, neck, behind ears) where body heat projects the fragrance. Less is more: 2–3 sprays maximum. You want people to notice your scent in close proximity, not from across the room. Invest in one quality fragrance (Eau de Parfum concentration lasts 6–8 hours) rather than multiple cheap body sprays. Woody, fresh, and amber-based scents consistently rate highest in male attractiveness studies.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Beard and facial hair<\u002Fdiv><div class=\"proto-body sm\">If growing a beard, keep the neckline and cheek lines clean and defined — an unkempt beard looks worse than no beard. Invest in a quality trimmer and beard oil (keeps hair soft and skin underneath hydrated). If clean-shaven, exfoliate before shaving to prevent ingrowns, use a sharp blade (change every 5–7 shaves), shave with the grain, and apply aftershave balm (not splash — alcohol strips and irritates the skin). Research note: stubble length of approximately 1–3mm (heavy stubble / 10-day beard) is consistently rated as the single most attractive facial hair style across multiple large-scale studies published in Evolution and Human Behavior.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================================================================== -->\n<!-- ============================ PART 4 ================================= -->\n<!-- ==================================================================== -->\n\n<!-- DIVIDER -->\n<section data-theme=\"dark\" data-nobar=\"\" data-part=\"4\" data-partname=\"Confidence\" data-divider=\"4\" data-label=\"04 · Confidence\">\n  <div class=\"sec-pill\"><span class=\"pill\">Section 4<\u002Fspan><\u002Fdiv>\n  <div class=\"sec-num\" data-anim=\"\">04<\u002Fdiv>\n  <div class=\"sec-name\" data-anim=\"\" style=\"--d:1;\">Confidence <button class=\"circ js-next sec-circ\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 8l-8 8M8 8h8v8\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n  <div class=\"sec-desc\" data-anim=\"\" style=\"--d:2;\">Looks get you noticed. Physique earns respect. But confidence is what fundamentally changes how people experience you — and how you experience your own life. This is not about faking it, performing a persona, or memorizing pickup lines. It is about building genuine, unshakeable self-assurance from the ground up through posture, vocal presence, psychological tools, social skills, and style. Confidence is a skill. Skills can be trained.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY CONFIDENCE 1 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Why Confidence Changes Everything\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Why Confidence Changes Everything\" data-label=\"Why Confidence Changes Everything\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Why Confidence Changes Everything<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">A behavioral state, <span class=\"muted\">not a trait.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Confidence is not a personality trait — it is a behavioral state that arises from competence, preparation, and repeated exposure to challenging situations. Research in social psychology consistently demonstrates that confident individuals are perceived as more attractive (independent of physical appearance), more competent, more trustworthy, and more socially influential.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:60ch;\">A 2007 study published in the Journal of Personality and Social Psychology found that self-assured behavior was the strongest predictor of social status in new group settings — more powerful than physical attractiveness, intelligence, or prior social connections. Separate research from the University of Texas found that confidence was rated as the single most attractive personality trait in a potential partner, by both men and women.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY CONFIDENCE 2 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Why Confidence Changes Everything\" data-part=\"4\" data-partname=\"Confidence\" data-label=\"Confidence · Why It Comes Last\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\" style=\"max-width:24ch;\">Why THE CODE addresses confidence <span class=\"muted\">last.<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 64px;margin-top:34px;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:54ch;\">The mechanism is straightforward: confident behavior signals that you have been tested and succeeded. It communicates that you belong in the room, that you have competence worth respecting, and that you are comfortable with who you are. This signal is deeply compelling because it cannot be faked convincingly for long — which is why genuine confidence, built on actual self-improvement, is infinitely more powerful than performed confidence.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;max-width:54ch;\">This is why THE CODE addresses confidence last — not because it is least important, but because the foundation for real confidence has already been built in Parts 1–3. When you are sleeping well, eating properly, training hard, and taking care of your appearance, you have objective evidence that you are investing in yourself. That evidence becomes the bedrock of genuine self-assurance.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- POSTURE 1 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Posture &amp; Body Language\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Posture &amp; Body Language\" data-label=\"Posture · The Standing Protocol\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Posture &amp; Body Language<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">The first thing people register <span class=\"muted\">about you.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Posture is the first thing people register about you — before your clothes, before your face, before you speak. Research in social psychology (Carney et al., 2010) shows that expansive, upright body language is correlated with perceived competence, dominance, trustworthiness, and attractiveness. Slumped, contracted posture communicates the opposite: low status, insecurity, and discomfort.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:20px;max-width:58ch;\"><strong>Standing posture protocol:<\u002Fstrong> Ears directly over shoulders. Shoulders directly over hips. Hips directly over ankles. This vertical alignment minimizes spinal compression and maximizes the projection of physical confidence. Chest open (imagine your sternum pulled gently upward by a string). Shoulders externally rotated — when relaxed, your palms should face forward or at 45 degrees, not backward. Slight chin tuck to align the cervical spine and prevent forward head posture.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- POSTURE 2 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Posture · Corrections\" data-part=\"4\" data-partname=\"Confidence\" data-label=\"Posture · Fixing The Common Issues\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Fixing the common issues<\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:28px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Forward head posture<\u002Fdiv><div class=\"proto-body sm\">Epidemic among men who work at desks or use phones for hours. For every inch your head protrudes forward from neutral, the effective weight on your cervical spine increases by approximately 4.5 kg (10 lbs). Fix with: chin tucks (3 sets of 15 reps daily — press the back of your head straight backward, creating a double chin), deep neck flexor strengthening (lie face-up, tuck chin and lift head 1 inch off the floor, hold 10 seconds, repeat 10 times), stretching the suboccipital muscles (two tennis balls at the base of your skull, lie on them for 2 minutes daily), and strengthening the mid and lower trapezius (face pulls, band pull-aparts, prone Y-raises).<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Rounded shoulders<\u002Fdiv><div class=\"proto-body sm\">Rounded shoulders result from tight pectorals and weak scapular retractors. Fix with: doorway pec stretch (forearm on door frame at 90°, lean through, hold 30 seconds, 2 sets each side, daily), wall slides (back, head, and arms against a wall, slide arms up and down maintaining contact — 3 sets of 12, daily), and face pulls in every Pull workout. These corrections take 4–8 weeks of consistent daily work to become your default posture.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Sitting posture<\u002Fdiv><div class=\"proto-body sm\">Hips slightly higher than or level with knees. Back supported by chair or self-supporting (do not slump into the chair back). Feet flat on the floor. Screen at eye level (laptop users: get an external monitor or laptop stand). Stand up and move for 2–3 minutes every 30–45 minutes — prolonged sitting compresses spinal discs, tightens hip flexors, and deactivates glutes, all of which worsen your standing posture.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BODY LANGUAGE -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Body Language Principles\" data-part=\"4\" data-partname=\"Confidence\" data-label=\"Body Language Principles\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Body language <span class=\"muted\">principles<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:34px;\">\n      <div><div class=\"fi-label\">Take up space<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Open stance. Arms uncrossed. Feet shoulder-width or wider. Hands visible (not in pockets or hidden behind back). When sitting, use the armrests. When standing, let your arms hang naturally or gesture when speaking. People who occupy more physical space are consistently perceived as higher-status. This is not about being aggressive — it is about being comfortable. Confident people do not shrink.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Move with intention<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Rushed movements, rapid walking, fidgeting, and nervous gestures all signal anxiety. Walk at a measured, purposeful pace. When you enter a room, do not rush to sit down — pause, orient yourself, then move. When reaching for something, extend deliberately. When speaking, use deliberate hand gestures that emphasize your points. Stillness communicates control.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Facial expression management<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">A neutral, relaxed face with a slight upward curve at the corners of the mouth is the baseline for social confidence. Avoid the two extremes: a tense, furrowed brow (signals stress or anger) and a constant grin (signals nervousness or people-pleasing). When greeting someone, let your smile build naturally rather than flashing it instantly — a gradual smile reads as genuine, an instant smile as performative.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EYE CONTACT -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Eye Contact Mastery\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Eye Contact Mastery\" data-label=\"Eye Contact Mastery\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Eye contact mastery<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">Arguably the single most powerful non-verbal communication tool available to you. Research by Kellerman et al. (1989) demonstrated that sustained mutual eye contact between strangers significantly increases feelings of intimacy, liking, and respect.<\u002Fp>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">The protocol<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Maintain natural eye contact for approximately 60–70% of the time when listening and 40–50% when speaking. Hold eye contact in comfortable intervals of 3–5 seconds, then briefly break and re-engage. When breaking eye contact, break to the side (neutral signal) rather than downward (submissive signal) or rapidly shifting around (anxious signal).<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">The triangle technique<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">When speaking face-to-face, alternate your gaze between the person's left eye, right eye, and mouth in a gentle triangle pattern. This creates the impression of deep, engaging attention without the intensity of staring at a single point. In one-on-one conversation, this is the standard for confident, attentive engagement.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"product\" data-anim=\"\" style=\"--d:3;margin-top:24px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\"><b>Practice progression —<\u002Fb> if sustained eye contact feels uncomfortable, build gradually. Week 1: maintain eye contact with cashiers and baristas during brief transactions. Week 2: hold eye contact during the first 5 seconds of any new conversation. Week 3: practice maintaining eye contact while the other person speaks for entire sentences. Week 4: maintain comfortable eye contact through full conversational turns. Within a month, it becomes natural.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VOCAL PRESENCE -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Vocal Presence\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Vocal Presence: How You Sound Matters\" data-label=\"Vocal Presence · How You Sound Matters\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Vocal presence <span class=\"muted\">— how you sound matters<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">Research from Quantified Communications found that how you say something accounts for 38% of communication impact (compared to 7% for the actual words). A confident vocal presence includes depth, pace, volume, and clarity.<\u002Fp>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Depth and resonance<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Speak from your diaphragm, not your throat. Place your hand on your chest — when you speak, you should feel vibration there. A deeper, resonant voice is consistently rated as more attractive and authoritative (Puts et al., 2006). You cannot dramatically change your pitch, but you can speak from a fuller, more resonant place by breathing deeply before speaking and relaxing your throat muscles.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Pace<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Slow down. Nervous speakers rush; confident speakers are comfortable with silence. Aim for 130–150 words per minute (most anxious speakers hit 180–200+). Pause before answering questions — the 1–2 second pause communicates thoughtfulness rather than anxious reaction. Pauses create anticipation and give your words more weight.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Volume<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Project your voice so the person furthest from you in a group can hear you clearly without straining. Under-projecting (mumbling, trailing off at the end of sentences) is one of the most common confidence killers. Practice speaking at a volume that feels slightly louder than comfortable — what feels like shouting to you often sounds like confident projection to others.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Fillers &amp; upspeak<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Reduce \"um,\" \"uh,\" \"like,\" \"you know,\" and \"basically\" — these communicate uncertainty. Record yourself for 2 minutes, then count filler words; awareness is the first step. And do not end declarative statements with a rising intonation (upspeak), which makes statements sound like questions and undermines your authority. End statements with a flat or downward intonation.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PSYCHOLOGY 1 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Psychology of Presence\" data-theme=\"dark\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"The Psychology of Presence &amp; State Control\" data-label=\"Presence · Priming &amp; Reframing\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">The Psychology of Presence &amp; State Control<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:20px;max-width:24ch;font-size:56px;\">Confidence is acting effectively despite nervousness — not the absence of it.<\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:2;margin-top:34px;\">\n      <div><div class=\"fi-label\" style=\"font-size:23px;color:var(--dark-ink);\">Pre-event priming · 5 minutes<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;color:#c9c6bd;\">Before any high-stakes situation, spend 5 minutes in a private space: stand in an expansive posture (feet wide, hands on hips or overhead) for 2 minutes to activate postural feedback loops, perform 10 slow diaphragmatic breaths (4 sec in, 6 sec out) to activate the parasympathetic nervous system, then spend 2 minutes visualizing the encounter going well. Visualization has measurable effects on performance across sports psychology research.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;color:var(--dark-ink);\">Reframing anxiety as excitement<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;color:#c9c6bd;\">Research by Alison Wood Brooks at Harvard Business School demonstrated that people who reframed pre-performance anxiety as excitement (by simply saying \"I am excited\" out loud) performed significantly better in public speaking, singing, and math tasks than those who tried to calm down. The physiological arousal is identical — the interpretation is what changes the outcome.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PSYCHOLOGY 2 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Psychology of Presence\" data-part=\"4\" data-partname=\"Confidence\" data-label=\"Presence · The 3-Second Rule &amp; Identity\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">State control <span class=\"muted\">/ continued<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">The 3-second rule<\u002Fdiv><div class=\"proto-body sm\">When you see an opportunity to act (approach someone, raise your hand, speak up in a meeting, make a cold introduction), act within 3 seconds. The longer you wait, the more your prefrontal cortex generates reasons not to act. Hesitation breeds more hesitation. Decisiveness breeds confidence. This is not about being impulsive — it is about training yourself to act on intention rather than waiting for fear to subside (it never does).<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Exposure therapy principle<\u002Fdiv><div class=\"proto-body sm\">Confidence in any domain is built through repeated exposure to that domain. You become confident at public speaking by speaking publicly. You become confident in social situations by putting yourself in them. There is no shortcut and no substitute. Every uncomfortable interaction that you survive makes the next one easier. Start small, increase gradually, and never stop expanding your comfort zone.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Identity-based confidence<\u002Fdiv><div class=\"proto-body sm\">The most durable confidence comes not from affirmations or techniques, but from evidence. Every time you complete a workout, you provide evidence that you are disciplined. Every time you maintain your skincare routine, evidence that you care about yourself. Every time you choose the hard path, you deposit into your confidence bank account. THE CODE is designed to generate this evidence daily. Over 12 weeks, the cumulative evidence becomes undeniable — and your self-image updates accordingly.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOCIAL CALIBRATION -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Social Calibration &amp; First Impressions\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Social Calibration &amp; First Impressions\" data-label=\"Social Calibration &amp; First Impressions\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Social calibration <span class=\"muted\">&amp; first impressions<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">First impressions are formed within 100 milliseconds and are remarkably persistent. The components, in order of processing speed: appearance, body language, vocal quality, and verbal content.<\u002Fp>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">The handshake<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Firm but not crushing (match the other person's grip pressure). Full web-to-web contact (not a fingertip grab). 2–3 pumps, 2–3 seconds total. Maintain eye contact and offer a genuine (not forced) smile. A weak handshake is cited in surveys as one of the most memorable negative first impressions.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">The introduction<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">State your name clearly and at a slightly lower pitch than your normal speaking voice (this triggers the perception of authority). \"I'm [Name]\" is sufficient — do not over-explain. After stating your name, immediately show interest in the other person. \"What brings you here?\" or \"How do you know [host]?\" shift the focus to them and begin building rapport.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Active listening<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">The most socially skilled people are the best listeners, not the best talkers. Maintain eye contact while they speak, nod at appropriate intervals, ask follow-up questions that show you were paying attention, and paraphrase key points (\"So what you are saying is...\"). Most people are not listened to — when you genuinely listen, you become memorable.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Depth &amp; generosity<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Move beyond surface topics as quickly as is comfortable. \"What made you get into that field?\" beats \"What do you do for work?\" Be the person who introduces people, gives specific compliments, remembers names and details, and makes others feel included. Social generosity is the fastest path to social influence — it costs nothing and compounds over time.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STYLE FUNDAMENTALS -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Style Fundamentals\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Style Fundamentals: Dress Like You Mean It\" data-label=\"Style Fundamentals · Dress Like You Mean It\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Style Fundamentals<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Fit is <span class=\"muted\">everything.<\u002Fspan><\u002Fh1>\n      <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:32ch;color:var(--grey-mid);\">A $15 tailoring job on a $30 shirt makes it look like a $100 shirt.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Style is not about spending a lot of money. It is about fit, consistency, and intentionality. A well-fitting plain t-shirt from a basic retailer outperforms an expensive but ill-fitting designer piece every time. Your clothing should complement the physique you are building — not hide it under oversized fabric or suffocate it in skin-tight fits.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:20px;max-width:58ch;\">Clothes should follow the contours of your body without being restrictive or baggy. Shoulder seams should sit exactly on your shoulder bone. Shirts should taper at the waist if you have built a V-taper. Pants should fit at the waist without needing a belt, and should break once at the shoe. If clothes do not fit off the rack, get them tailored.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CAPSULE WARDROBE -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Building a Capsule Wardrobe\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Building a Capsule Wardrobe\" data-label=\"Building a Capsule Wardrobe\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Building a capsule wardrobe<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">Start with 15–20 versatile pieces in a cohesive color palette: neutral base colors (black, white, navy, charcoal grey, olive) with 1–2 accent colors that suit your skin tone. Every piece should work with at least 3 others. Get dressed in 2 minutes and look put-together every single day.<\u002Fp>\n    <div class=\"cardrow c4\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n      <div class=\"card\" style=\"padding:30px;\"><div class=\"checkgroup-h\">Tops<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">3–4 plain crew-neck t-shirts (white, black, navy, grey), 2 long-sleeve henleys or fitted sweaters, 1–2 button-down shirts (one white, one neutral or subtle pattern), 1 quality hoodie or quarter-zip.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:30px;\"><div class=\"checkgroup-h\">Bottoms &amp; Outerwear<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">1 pair dark slim/straight jeans, 1 pair black jeans or trousers, 1 pair chinos (navy, khaki, or olive), athletic shorts. 1 versatile jacket (bomber, denim, or field), 1 warmer coat.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:30px;\"><div class=\"checkgroup-h\">Footwear<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">1 minimal white leather sneaker (the single most versatile shoe in menswear), 1 black sneaker or Chelsea boot, 1 pair of dress shoes or loafers for formal occasions.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:30px;\"><div class=\"checkgroup-h\">Accessories<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">1 quality watch (clean and simple design), 1 subtle chain or bracelet if it fits your style (optional), a quality belt that matches your shoe color.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:3;margin-top:22px;max-width:104ch;color:var(--grey-mid);\"><strong style=\"color:var(--ink);\">Grooming amplifies style.<\u002Fstrong> The best wardrobe is undermined by a bad haircut, uneven facial hair, or dirty shoes. A fresh haircut every 3–4 weeks, maintained facial hair (or a clean shave), clean shoes, and the grooming protocols from Part 3 ensure your presentation is cohesive from head to toe. People register the total package instantaneously.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FEEDBACK LOOP -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"The Confidence Feedback Loop\" data-theme=\"dark\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"The Confidence Feedback Loop\" data-label=\"The Confidence Feedback Loop\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">The Confidence Feedback Loop<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:20px;max-width:24ch;font-size:54px;\">Each positive outcome reinforces every behavior in the chain.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:28px;max-width:98ch;color:#c9c6bd;\">When you sleep better, you have more energy to train. When you train, you build a physique that makes your clothes fit better. When you look better, people respond differently to you. When people respond positively, your confidence grows. When your confidence grows, you take more social risks. When you take more social risks, you get more positive outcomes.<\u002Fp>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:3;margin-top:18px;max-width:98ch;color:#c9c6bd;\">This is why THE CODE works where isolated interventions fail. A skincare routine alone changes your complexion but not your confidence. A gym program alone changes your body but not how you carry it. THE CODE changes everything simultaneously — and the synergy between the pillars creates results exponentially greater than any single pillar could produce alone. After 12 weeks, the system runs on autopilot. The routines are habits. The habits produce results. The results produce confidence. And the confidence makes everything easier. This is the ascend.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOCIAL SKILLS 1 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Social Skills\" data-part=\"4\" data-partname=\"Confidence\" data-menu=\"Social Skills: Conversation, Networking &amp; Dating\" data-label=\"Social Skills · Conversation &amp; Questions\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Social skills <span class=\"muted\">— conversation, networking &amp; dating<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Conversation structure<\u002Fdiv><div class=\"proto-body sm\">The best conversations follow a natural rhythm: open with a situational observation or genuine question, listen actively, share something about yourself that relates to what they said (self-disclosure builds trust), then deepen with follow-up questions. The ratio should be roughly 50/50 speaking and listening — but err on the side of listening more. Most people talk too much about themselves when nervous.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Asking better questions<\u002Fdiv><div class=\"proto-body sm\">Replace closed questions (yes/no answers) with open questions that invite stories. Instead of \"Do you like your job?\" ask \"What made you choose that career path?\" Instead of \"Are you from here?\" ask \"What is the best thing about where you grew up?\" Story-provoking questions create deeper connections faster and make you more memorable.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">The vulnerability principle<\u002Fdiv><div class=\"proto-body sm\">Research by Brené Brown and others demonstrates that appropriate vulnerability accelerates trust and connection. Sharing a genuine opinion, admitting you do not know something, or acknowledging a past mistake makes you more relatable and trustworthy — not less. People connect with authenticity, not perfection. The key word is appropriate — match the depth of your disclosure to the depth of the relationship.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SOCIAL SKILLS 2 -->\n<section data-section=\"Part 4 · Confidence\" data-topic=\"Social Skills\" data-part=\"4\" data-partname=\"Confidence\" data-label=\"Social Skills · Networking, Dating, Rejection\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Networking, dating <span class=\"muted\">&amp; rejection<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Networking<\u002Fdiv><div class=\"proto-body sm\">Approach networking as giving, not getting. Before any event, prepare 2–3 genuine questions about the industry or topic. When you meet someone interesting, ask how you can help them or connect them with someone relevant. Follow up within 24 hours with a brief message referencing something specific from your conversation. The men who build the strongest networks consistently add value before asking for anything in return.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Romantic interactions<\u002Fdiv><div class=\"proto-body sm\">Everything in this section — posture, eye contact, vocal presence, active listening, style — compounds into romantic attractiveness. But the specific skill most men lack is showing genuine interest without neediness. Interest means you find someone compelling and want to know more. Neediness means you need their validation to feel good about yourself. The difference is whether your confidence exists independently of their response. After 12 weeks of building your body, appearance, and inner confidence, that independence is real — and it is deeply attractive.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Rejection reframing<\u002Fdiv><div class=\"proto-body sm\">Rejection is information, not identity. A \"no\" in any context tells you about fit, timing, or circumstances. It does not tell you about your worth. The men who succeed socially are not the ones who never get rejected — they are the ones who get rejected more often because they take more action. Every rejection reduces its emotional weight. After 50 conversations, a \"no\" feels like a shrug. This is exposure therapy applied to social life.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================================================================== -->\n<!-- ============================ PART 5 ================================= -->\n<!-- ==================================================================== -->\n\n<!-- DIVIDER -->\n<section data-theme=\"dark\" data-nobar=\"\" data-part=\"5\" data-partname=\"The System\" data-divider=\"5\" data-label=\"05 · The System\">\n  <div class=\"sec-pill\"><span class=\"pill\">Section 5<\u002Fspan><\u002Fdiv>\n  <div class=\"sec-num\" data-anim=\"\">05<\u002Fdiv>\n  <div class=\"sec-name\" data-anim=\"\" style=\"--d:1;\">The System <button class=\"circ js-next sec-circ\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 8l-8 8M8 8h8v8\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n  <div class=\"sec-desc\" data-anim=\"\" style=\"--d:2;\">Knowledge is worthless without execution. This section takes everything from Parts 1–4 and compresses it into daily routines, weekly schedules, and a 12-week transformation timeline. Print this section. Put it on your wall. Follow it without exception. This is where the protocol becomes a lifestyle.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- DAILY BLUEPRINT — MORNING -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Daily Blueprint · Morning\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Your Daily Blueprint\" data-label=\"Daily Blueprint · Morning Routine\">\n  <div class=\"body\">\n    <div style=\"display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;\" data-anim=\"\">\n      <h2 class=\"mid\">Morning routine<\u002Fh2>\n      <span class=\"bodytext sm\" style=\"color:var(--grey-mid);\">within 60 minutes of waking<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:12%;\">Time<\u002Fth><th style=\"width:48%;\">Action<\u002Fth><th style=\"width:40%;\">Purpose<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">0 min<\u002Ftd><td>Wake at consistent time. No snooze button.<\u002Ftd><td>Circadian rhythm integrity. Discipline signal.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">+5 min<\u002Ftd><td>500 ml water with pinch of sea salt<\u002Ftd><td>Rehydrate after 7–9 hours of zero fluid intake.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">+10 min<\u002Ftd><td>10–15 min direct sunlight exposure (outside)<\u002Ftd><td>Set circadian clock. Cortisol peak. Vitamin D synthesis.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">+15 min<\u002Ftd><td>Skincare: cleanser, moisturizer, SPF<\u002Ftd><td>Shield your skin for the day.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">+25 min<\u002Ftd><td>Breakfast: 30–40 g protein minimum<\u002Ftd><td>Break overnight fast. First MPS stimulation of the day.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">+30 min<\u002Ftd><td>Supplements: multivitamin, omega-3, creatine 5g<\u002Ftd><td>Daily micronutrient and performance foundation.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DAILY BLUEPRINT — TRAINING -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Daily Blueprint · Training\" data-part=\"5\" data-partname=\"The System\" data-label=\"Daily Blueprint · Training Window\">\n  <div class=\"body\">\n    <div style=\"display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;\" data-anim=\"\">\n      <h2 class=\"mid\">Training window<\u002Fh2>\n      <span class=\"bodytext sm\" style=\"color:var(--grey-mid);\">adjust to your schedule<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:12%;\">Time<\u002Fth><th style=\"width:50%;\">Action<\u002Fth><th style=\"width:38%;\">Purpose<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Pre −30m<\u002Ftd><td>Pre-workout meal: carbs + protein (e.g. rice + chicken, oats + whey)<\u002Ftd><td>Fuel glycogen stores for the session.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Pre −10m<\u002Ftd><td>Optional: pre-workout supplement on hard days<\u002Ftd><td>Caffeine + citrulline for focus and blood flow.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Session<\u002Ftd><td>Follow your level's program from Part 2 (45–75 min)<\u002Ftd><td>Progressive overload stimulus for muscle growth.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Post +0m<\u002Ftd><td>Post-workout shake: 30–50 g whey protein isolate<\u002Ftd><td>Rapid leucine delivery for muscle protein synthesis.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Post +60m<\u002Ftd><td>Full meal: protein + complex carbs + vegetables<\u002Ftd><td>Glycogen replenishment, micronutrients, recovery.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DAILY BLUEPRINT — EVENING -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Daily Blueprint · Evening\" data-theme=\"dark\" data-part=\"5\" data-partname=\"The System\" data-label=\"Daily Blueprint · Evening Routine\">\n  <div class=\"body\">\n    <div style=\"display:flex;align-items:baseline;gap:22px;flex-wrap:wrap;\" data-anim=\"\">\n      <h2 class=\"mid\" style=\"color:var(--dark-ink);\">Evening routine<\u002Fh2>\n      <span class=\"bodytext sm\" style=\"color:#9b988f;\">60–90 minutes before bed<\u002Fspan>\n    <\u002Fdiv>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:12%;\">Time<\u002Fth><th style=\"width:50%;\">Action<\u002Fth><th style=\"width:38%;\">Purpose<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Bed −90m<\u002Ftd><td>Blue light glasses on. Dim all room lighting.<\u002Ftd><td>Begin melatonin production. Wind-down signal.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bed −60m<\u002Ftd><td>Optional: warm shower or bath (10 min)<\u002Ftd><td>Core temperature drop triggers faster sleep onset.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bed −45m<\u002Ftd><td>Skincare: cleanser, peptide/retinol serum, eye cream, moisturizer<\u002Ftd><td>Overnight repair, collagen synthesis, regeneration.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bed −30m<\u002Ftd><td>Magnesium glycinate 200–400 mg + hormone support supplement<\u002Ftd><td>Sleep quality, muscle relaxation, hormonal optimization.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bed −15m<\u002Ftd><td>5 min structured breathing (box breathing or physiological sighs)<\u002Ftd><td>Parasympathetic nervous system activation.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bed 0m<\u002Ftd><td>Lights out. Room 16–19°C. Phone out of room.<\u002Ftd><td>7.5–9 hours of anabolic recovery begins.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- 12-WEEK TIMELINE -->\n<section data-section=\"Part 5 · The System\" data-topic=\"The 12-Week Timeline\" data-part=\"5\" data-partname=\"The System\" data-menu=\"The 12-Week Transformation Timeline\" data-label=\"The 12-Week Transformation Timeline\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The 12-week transformation timeline<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:12px;max-width:104ch;color:var(--grey-mid);\">Change does not happen overnight — but it happens faster than you think when every variable is optimized simultaneously. Here is an honest timeline of what many men can expect; results vary by individual.<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:20px;\">\n      <thead><tr><th style=\"width:8%;\">Week<\u002Fth><th style=\"width:31%;\">Gym progress<\u002Fth><th style=\"width:31%;\">Looks progress<\u002Fth><th style=\"width:30%;\">What many men feel<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">1–2<\u002Ftd><td>Learning the program. Establishing form, tempo, and mind-muscle connection.<\u002Ftd><td>Skin adjusting to retinol (possible mild flaking). SPF habit forming. Hair serum routine starting.<\u002Ftd><td>Routine feels effortful. Motivation is high but discipline is still forming.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">3–4<\u002Ftd><td>First strength increases via neurological adaptation. Weights feel lighter. Pump more noticeable.<\u002Ftd><td>Skin texture measurably improving. Hydration visible. Morning puffiness reducing. Dark spots beginning to fade.<\u002Ftd><td>Routine is becoming automatic. Energy and sleep quality noticeably improving.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">5–6<\u002Ftd><td>Progressive overload producing visible results. Clothes fitting differently around shoulders and chest.<\u002Ftd><td>Skin clarity obvious to others. Complexion more even. Hair products showing early results.<\u002Ftd><td>Confidence building. You start receiving unsolicited comments on your appearance.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">7–8<\u002Ftd><td>Muscle definition emerging. Body composition changing. V-taper developing.<\u002Ftd><td>Full retinol tolerance built. Skin looks noticeably healthier than week 1. Grooming routine dialed.<\u002Ftd><td>A new identity is forming. You feel and act differently in social situations.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">9–10<\u002Ftd><td>Significant measurable strength gains. Physique visibly different in photos and mirror.<\u002Ftd><td>Skin transformation visible in comparison photos. Face leaner. Hair thicker. Under-eyes improved.<\u002Ftd><td>Others actively ask what you have been doing. Confidence feels natural, not forced.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">11–12<\u002Ftd><td>Personal record territory across all lifts. Physique can look dramatically different from where you started.<\u002Ftd><td>Major, visible skin improvement. Routine is second nature. You can look noticeably different from where you started.<\u002Ftd><td>Many men barely recognize the version of themselves from 12 weeks ago — and others tend to notice too.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FIRST WEEK INTRO -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Your First Week\" data-theme=\"dark\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Your First Week: Day by Day\" data-label=\"Your First Week · Day by Day\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Your First Week · Day by Day<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:24ch;font-size:60px;\">The first week is the hardest because everything is new.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:84ch;color:#c9c6bd;\">Here is exactly what to do each day so there is zero guesswork. After this week, the routines become familiar and the system takes over.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FIRST WEEK DAYS 1-4 -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Your First Week\" data-part=\"5\" data-partname=\"The System\" data-label=\"First Week · Days 1–4\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">First week <span class=\"muted\">— days 1–4<\u002Fspan><\u002Fh2>\n    <div class=\"cardrow c4\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <div class=\"card\" style=\"padding:28px;\"><div class=\"checkgroup-h\">Day 1 · Monday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:19px;margin-top:8px;\">Full morning routine: water, sunlight, skincare (cleanser + moisturizer + SPF), protein-rich breakfast, supplements. Upper A workout in the afternoon/evening. Full evening skincare with peptide serum. Magnesium before bed. Lights out at target time. Take your first progress photos (front, side, back) and body measurements. Record your starting weight.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px;\"><div class=\"checkgroup-h\">Day 2 · Tuesday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:19px;margin-top:8px;\">Same morning routine — consistency starts immediately. Lower A workout. Walk 8,000+ steps throughout the day. Practice holding eye contact with one person in a brief interaction (cashier, colleague). Evening skincare. Record your workout in your training log — every set, rep, and weight.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px;\"><div class=\"checkgroup-h\">Day 3 · Wednesday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:19px;margin-top:8px;\">Rest day from lifting. Use this day for meal prep: cook chicken, rice, and eggs for the next 3 days. Store in containers. Do 20–30 minutes of walking. Practice 5 minutes of box breathing before bed. Apply your hair growth serum if using one. Clean up your eyebrows if needed.<\u002Fp><\u002Fdiv>\n      <div class=\"card\" style=\"padding:28px;\"><div class=\"checkgroup-h\">Day 4 · Thursday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:19px;margin-top:8px;\">Morning routine. Upper B workout. Focus on form — do not chase heavy weight yet. This week is about learning the movements. Evening routine including skincare. Review your capsule wardrobe — identify what you have and what you need to buy this weekend.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FIRST WEEK DAYS 5-7 -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Your First Week\" data-part=\"5\" data-partname=\"The System\" data-label=\"First Week · Days 5–7\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">First week <span class=\"muted\">— days 5–7<\u002Fspan><\u002Fh2>\n    <div class=\"cardrow\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <div class=\"card\"><div class=\"checkgroup-h\">Day 5 · Friday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">Morning routine. Lower B workout. Walk 10,000+ steps today. Do your first chemical exfoliation in the evening (BHA or AHA — not on the same night as retinol). Trim and file your nails. Clean your shoes.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"checkgroup-h\">Day 6 · Saturday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">Rest day from lifting. Apply a hydrating face mask for 15–20 minutes. Do 30 minutes of walking or light activity. Go shopping for any capsule wardrobe pieces you identified. Get a haircut if it has been more than 3 weeks. Practice one social interaction outside your comfort zone — introduce yourself to someone new, make conversation with a stranger, or attend a social event you would normally skip.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"checkgroup-h\">Day 7 · Sunday<\u002Fdiv><p class=\"bodytext sm\" style=\"font-size:20px;margin-top:8px;\">Rest and preparation day. Meal prep for the coming week. Review your training log from the week — note all weights used so you can progress next week. Take your second weigh-in. Reflect on what felt easy and what felt hard. Write down one thing you will do better next week. Set your alarm. Go to bed at target time. You have completed Week 1 of THE CODE.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TRACKING -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Tracking Progress\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Tracking Progress &amp; Staying Accountable\" data-label=\"Tracking Progress &amp; Staying Accountable\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Tracking progress <span class=\"muted\">&amp; staying accountable<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:32px;\">\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Training log<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Record every workout — exercise, weight, sets, reps, and RIR. Use a notebook or an app. Review weekly to ensure progressive overload is happening. If you see stagnation across 2+ weeks, adjust volume, intensity, or recovery.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Body measurements<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Take chest, waist, hip, arm, and thigh measurements every 2 weeks. Weigh yourself daily at the same time (morning, after bathroom, before food) and track the weekly average — daily fluctuations are meaningless, but the trend over weeks tells the truth.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Progress &amp; skin photos<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Take front, side, and back photos in the same lighting, location, and time of day, every 2 weeks. You see yourself daily and cannot perceive gradual changes — photos are the most motivating and honest tracking tool available. Photograph your face under the same conditions too; comparing week 1 to week 8 will shock you.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:23px;\">Accountability<\u002Fdiv><div class=\"fi-body\" style=\"font-size:20px;\">Tell one person what you are doing — a friend, a family member, a training partner. Research shows that publicly committing to a goal increases follow-through by over 65%. Even better: find someone doing THE CODE with you. Shared accountability is the strongest predictor of long-term adherence.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CHECKLIST INTRO -->\n<section data-section=\"Part 5 · The System\" data-topic=\"The Ascend Checklist\" data-theme=\"dark\" data-part=\"5\" data-partname=\"The System\" data-menu=\"The Ascend Checklist\" data-label=\"The Ascend Checklist\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">The Ascend Checklist<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:20ch;font-size:64px;\">Every box you check moves you forward. Every box you skip costs you.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:70ch;color:#c9c6bd;\">Use this every single day. Print it. Screenshot it. Put it where you will see it.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CHECKLIST — FOUNDATION & GYM -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Checklist · Foundation &amp; Gym\" data-part=\"5\" data-partname=\"The System\" data-label=\"Checklist · Foundation &amp; Gym\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Daily checklist <span class=\"muted\">— Foundation &amp; Gym<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 70px;margin-top:30px;\" data-anim=\"\">\n      <div style=\"--d:1;\">\n        <div class=\"checkgroup-h\">Foundation<\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Slept 7.5–9 hours (consistent bed and wake time ±30 min)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Drank 35–40 ml per kg bodyweight of water (spread throughout day)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Hit protein target: 1.6–2.2 g/kg across 3–5 meals<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Hit calorie target for current goal (surplus / deficit / maintenance)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Took daily supplements: multivitamin, omega-3, creatine 5g<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Got 10–15 min morning sunlight within 30 min of waking<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">No caffeine consumed after 14:00<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">5 min breathing protocol before bed (box breathing or sighs)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"checkgroup-h\">Gym<\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Completed training session following the program exactly<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Logged all weights, sets, reps, and RIR in training log<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Applied progressive overload where possible (more weight or reps)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Hit daily step target: 8,000–12,000 steps<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Stretched and performed mobility work post-training or on rest days<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CHECKLIST — LOOKS & CONFIDENCE -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Checklist · Looks &amp; Confidence\" data-part=\"5\" data-partname=\"The System\" data-label=\"Checklist · Looks &amp; Confidence\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Daily checklist <span class=\"muted\">— Looks &amp; Confidence<\u002Fspan><\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 70px;margin-top:30px;\" data-anim=\"\">\n      <div>\n        <div class=\"checkgroup-h\">Looks<\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Morning skincare: cleanser, moisturizer, SPF (every single day)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Evening skincare: cleanser, serum (retinol/peptide), eye cream, moisturizer<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Applied hair growth serum to scalp (if relevant)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Weekly: exfoliation 1–2x and hydrating mask 1x (on correct days)<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Grooming check: hair, nails, brows, beard, teeth<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"checkgroup-h\">Confidence<\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Posture check: ears over shoulders, chest open, chin tucked<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Practiced intentional eye contact in at least one conversation<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Dressed with intention: fit, clean, cohesive outfit<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Spoke with deliberate pace and projected voice<\u002Fspan><\u002Fdiv>\n        <div class=\"checkitem\"><span class=\"box\"><\u002Fspan><span class=\"ct\">Took one social action outside comfort zone (however small)<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL WORDS -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Final Words\" data-theme=\"dark\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Final Words\" data-label=\"Final Words\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Final Words<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:20px;max-width:22ch;font-size:62px;\">Reading is not doing. The distance is execution.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:82ch;color:#c9c6bd;\">You have read the entire CODE. Every principle, every protocol, every detail is now in your hands. Start today. Not Monday. Not next week. Today. Do the first thing on the checklist. Then the next. Then the next. Stack small actions into days, days into weeks, weeks into transformation. The compound effect does not care about motivation — it cares about consistency.<\u002Fp>\n    <p class=\"lead\" data-anim=\"\" style=\"--d:3;margin-top:28px;max-width:40ch;font-weight:600;color:var(--dark-ink);\">Twelve weeks from now, you will either wish you had started today, or be grateful that you did.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MENTAL HEALTH 1 -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Mental Health &amp; Mindset\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Mental Health &amp; Mindset\" data-label=\"Mental Health · Self-Respect &amp; Discipline\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Mental health <span class=\"muted\">&amp; mindset<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:12px;max-width:104ch;color:var(--grey-mid);\">THE CODE is designed to transform your external appearance and physical performance. But we would be doing you a disservice if we did not address the internal work that makes everything sustainable.<\u002Fp>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Self-improvement is not self-hatred<\u002Fdiv><div class=\"proto-body sm\">The motivation to change should come from self-respect — the belief that you deserve better — not from self-loathing or the idea that you are fundamentally broken. You are not broken. You are a man who has decided to take ownership of his potential. That decision alone places you ahead of the vast majority who never make it.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Comparison is a thief<\u002Fdiv><div class=\"proto-body sm\">Social media shows you the highlight reel of other men's lives — their best angles, their peak physiques, their curated successes. Your transformation is yours. Compare yourself only to who you were yesterday, last week, last month. Progress photos exist for this reason — they anchor you to your own trajectory, not someone else's.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Discipline over motivation<\u002Fdiv><div class=\"proto-body sm\">Motivation is an emotion — it fluctuates, it fades, it depends on mood. Discipline is a decision — it operates regardless of how you feel. You will not always feel like training, doing skincare, or eating properly. Do it anyway. Every time you act despite not feeling like it, you strengthen the neural pathways of discipline. Over time, the actions that once required willpower become automatic. This is how habits are formed — not through motivation, but through repetition.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MENTAL HEALTH 2 -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Mental Health &amp; Mindset\" data-part=\"5\" data-partname=\"The System\" data-label=\"Mental Health · Plateaus, Environment, Help\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Mindset <span class=\"muted\">/ continued<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Progress is not linear<\u002Fdiv><div class=\"proto-body sm\">There will be weeks where the scale does not move, where your lifts plateau, where your skin seems to get worse before it gets better (retinol purging is real and temporary). These plateaus are normal and expected. They are not signs to quit — they are signs that your body is adapting. Push through them with consistency and the breakthrough always comes.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Your environment matters<\u002Fdiv><div class=\"proto-body sm\">You are the average of the five people you spend the most time with. If your social circle does not support your growth — or actively undermines it through mockery, peer pressure to drink, or dismissal of self-improvement — you need to evaluate those relationships honestly. This does not mean cutting everyone off. It means being intentional about who influences your daily decisions and spending more time with people who share your standards.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Celebrate progress &amp; seek help<\u002Fdiv><div class=\"proto-body sm\">Most men are terrible at acknowledging how far they have come. When you hit a new PR, notice it. When someone compliments your skin, absorb it. Keep a journal of wins — read it when motivation is low. And if you are struggling with persistent anxiety, depression, body image issues, disordered eating, or any mental health challenge that interferes with daily functioning, seek professional support. Working with a therapist is not weakness — it is the same strategic decision as hiring a coach for the gym.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LEGACY -->\n<section data-section=\"Part 5 · The System\" data-topic=\"The Legacy of Your Decisions\" data-theme=\"dark\" data-part=\"5\" data-partname=\"The System\" data-menu=\"The Legacy of Your Decisions\" data-label=\"The Legacy of Your Decisions\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">The Legacy of Your Decisions<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:20px;max-width:20ch;font-size:60px;\">That is the CODE. Not a set of instructions. An identity.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:28px;max-width:98ch;color:#c9c6bd;\">Every day you execute THE CODE, you are not just building a better body or a better face. You are building evidence of who you are — the man who follows through, who keeps promises to himself, who does the hard thing when the easy thing is available. The physique, the skin, the confidence — those are the visible manifestations. But the invisible shift in how you see yourself is what lasts forever.<\u002Fp>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:3;margin-top:18px;max-width:98ch;color:#c9c6bd;\">We started Acendsion because we believe every man deserves to know what he is capable of — and to have the exact roadmap to get there. We did not have this when we started. You do. That is an advantage most men will never have. Use it. If this protocol makes a difference for you — and we built it to — share your story with us. Post your results. Tell your story. Show other men that the path exists. See you on the other side.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRODUCT STACK SUMMARY -->\n<section data-section=\"Part 5 · The System\" data-topic=\"Your Product Stack Summary\" data-part=\"5\" data-partname=\"The System\" data-menu=\"Your Product Stack Summary\" data-label=\"Your Product Stack Summary\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Your product stack <span class=\"muted\">summary<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:22px;\">\n      <thead><tr><th style=\"width:30%;\">Product<\u002Fth><th style=\"width:30%;\">When<\u002Fth><th style=\"width:40%;\">Purpose in the protocol<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Peptide Face Serum<\u002Ftd><td>Evening skincare<\u002Ftd><td>Retinol + peptide collagen stimulation, texture refinement<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Peptide Hair Growth Serum<\u002Ftd><td>Daily, after shower<\u002Ftd><td>Follicle-supporting peptides for hair maintenance<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Dark Spot Serum<\u002Ftd><td>Evening, on affected areas<\u002Ftd><td>Brightening agents for hyperpigmentation treatment<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Peptide Eye-Gel Cream<\u002Ftd><td>Evening skincare<\u002Ftd><td>Under-eye hydration, dark circle and puffiness reduction<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Liver Support<\u002Ftd><td>Evening with dinner<\u002Ftd><td>Overnight detoxification, metabolic recovery support<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Probiotic with Prebiotics<\u002Ftd><td>Morning, before food<\u002Ftd><td>Gut health, nutrient absorption, skin clarity<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Creatine Monohydrate<\u002Ftd><td>Daily (any time), 5g<\u002Ftd><td>Strength, power output, muscle cell hydration<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Chocolate Whey Protein Isolate<\u002Ftd><td>Post-workout or between meals<\u002Ftd><td>Fast-absorbing protein for muscle protein synthesis<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Fruit Punch Pre-Workout<\u002Ftd><td>15–30 min pre-training<\u002Ftd><td>Caffeine, citrulline, beta-alanine for performance<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Male Hormone Support<\u002Ftd><td>Before bed, 3 capsules<\u002Ftd><td>Testosterone support, hormonal balance, recovery<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Complete Multivitamin<\u002Ftd><td>Morning with breakfast<\u002Ftd><td>Micronutrient insurance: D3, zinc, K2, B-complex<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLOSING -->\n<section data-theme=\"dark\" data-nobar=\"\" data-section=\"The Code\" data-topic=\"Ascend\" data-label=\"Ascend\">\n  <div class=\"frame\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div style=\"position:absolute;left:var(--pad);right:var(--pad);top:48px;display:flex;justify-content:space-between;align-items:center;\">\n      <span style=\"display:flex;align-items:center;gap:11px;font-size:24px;font-weight:700;letter-spacing:.04em;\"><span style=\"width:12px;height:12px;background:var(--dark-ink);transform:rotate(45deg);display:inline-block;\"><\u002Fspan>ACENDSION<\u002Fspan>\n      <span class=\"tb-copy\">© 2026 · The Code<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"q-mark\" data-anim=\"\">“<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:4px;max-width:24ch;font-size:64px;\">Discipline is choosing between what you want now and what you want most.<\u002Fh2>\n    <p class=\"kicker\" data-anim=\"\" style=\"--d:2;margin-top:46px;color:#8b887f;\">You now have the complete system<\u002Fp>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:3;margin-top:16px;max-width:74ch;color:#c9c6bd;\">Every protocol. Every routine. Every detail. There are no more excuses and no more missing pieces. The only variable left is you.<\u002Fp>\n    <div data-anim=\"\" style=\"--d:4;margin-top:42px;display:flex;align-items:center;gap:22px;\">\n      <span style=\"font-size:40px;font-weight:700;letter-spacing:-.02em;\">Execute the system. Trust the process. Ascend.<\u002Fspan>\n    <\u002Fdiv>\n    <div data-anim=\"\" style=\"--d:5;position:absolute;left:var(--pad);right:var(--pad);bottom:var(--pad);padding-top:24px;display:flex;justify-content:space-between;align-items:center;\">\n      <div class=\"drawline jsline\" style=\"position:absolute;left:0;right:0;top:0;width:auto;background:var(--d-line);\"><\u002Fdiv>\n      <span class=\"tb-copy\">acendsion.com<\u002Fspan>\n      <button class=\"circ\" onclick=\"document.querySelector('deck-stage').goTo(0)\" style=\"border-color:var(--dark-ink);\"><svg viewBox=\"0 0 24 24\" style=\"stroke:var(--dark-ink);\"><path d=\"M19 12H5M12 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!--SLIDES-->\n<\u002Fdeck-stage>\n\n<!-- fixed chrome -->\n<div class=\"progress\" id=\"progress\"><\u002Fdiv>\n<div class=\"navgroup\" id=\"navGroup\">\n  <button class=\"menu-toggle\" id=\"menuToggle\"><span class=\"mi\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan>Contents<\u002Fbutton>\n  <div class=\"botbar\">\n    <button id=\"navPrev\" aria-label=\"Previous\"><svg viewBox=\"0 0 24 24\"><path d=\"M15 5l-7 7 7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n    <span class=\"navcount\" id=\"navCount\"><\u002Fspan>\n    <button id=\"navNext\" aria-label=\"Next\"><svg viewBox=\"0 0 24 24\"><path d=\"M9 5l7 7-7 7\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"menu-panel\" id=\"menuPanel\">\n  <div class=\"menu-inner\">\n    <div class=\"menu-head\"><h3>Contents<\u002Fh3><button class=\"menu-close\" id=\"menuClose\">×<\u002Fbutton><\u002Fdiv>\n    <div id=\"menuList\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script src=\"0cae09c0-2a48-48c9-936a-b1929ad13de9\"><\u002Fscript>\n<script>\n(function(){\n  const deck = document.querySelector('deck-stage');\n  const sections = Array.from(deck.children).filter(n=>n.tagName==='SECTION');\n  const total = sections.length;\n  const pad2 = n => String(n).padStart(2,'0');\n\n  /* ---- Introduction section: everything before the Foundation divider ---- */\n  const firstFoundation = sections.findIndex(s=>s.dataset.divider==='1');\n  const isIntro = i => firstFoundation>0 && i<firstFoundation && !sections[i].dataset.part;\n\n  /* ---- inject persistent top bar into every slide (no arrow, no page counter) ---- */\n  sections.forEach((s,i)=>{\n    const part = isIntro(i) ? 'Introduction' : (s.dataset.section || '');\n    const topic = s.dataset.topic || '';\n    const bar = document.createElement('div');\n    bar.className='topbar'; bar.dataset.anim=''; bar.style.setProperty('--d','0');\n    bar.innerHTML =\n      '<div class=\"tb-l\">'+\n        (part?'<span class=\"pill\">'+part+'<span class=\"cardline\"><\u002Fspan><\u002Fspan>':'')+\n        (topic?'<span class=\"tb-topic\">'+topic+'<\u002Fspan>':'')+\n      '<\u002Fdiv>'+\n      '<div class=\"tb-r\">'+\n        '<span class=\"tb-copy\">© 2026 Acendsion · The Code<\u002Fspan>'+\n      '<\u002Fdiv>';\n    // divider & title slides manage their own chrome -> skip bar if data-nobar\n    if(s.dataset.nobar===undefined) s.appendChild(bar);\n  });\n\n  /* ---- per-section grouping (for the bottom counter) ---- */\n  // group key: by part when present, else by data-section, else standalone.\n  const groupOf = [], groupName = [];\n  const groupTotals = {}, groupPos = [];\n  sections.forEach((s,i)=>{\n    let key, name;\n    if(s.dataset.part){ key='p'+s.dataset.part; name=s.dataset.partname||('Part '+s.dataset.part); }\n    else if(isIntro(i)){ key='intro'; name='Introduction'; }\n    else { key='s:'+(s.dataset.section||'overview'); name=s.dataset.section||''; }\n    groupOf[i]=key; groupName[i]=name;\n    groupTotals[key]=(groupTotals[key]||0)+1;\n    groupPos[i]=groupTotals[key];\n  });\n\n  /* ---- divider map (part number -> its divider slide index) ---- */\n  const dividerIdx = {};\n  sections.forEach((s,i)=>{ if(s.dataset.divider) dividerIdx[s.dataset.divider]=i; });\n  document.addEventListener('click', e=>{\n    const tp = e.target.closest('[data-target-part]');\n    if(tp){ const idx = dividerIdx[tp.dataset.targetPart]; if(idx!=null) deck.goTo(idx); return; }\n    const ti = e.target.closest('[data-target-idx]');\n    if(ti){ deck.goTo(+ti.dataset.targetIdx); }\n  });\n\n  /* ---- disable deck-stage click/tap-anywhere-to-advance (nav only via arrows/keys/menu) ---- */\n  try{ if(deck._onTap) deck.removeEventListener('click', deck._onTap); }catch(e){}\n  // Bulletproof: neutralise any 'tap'-reason navigation at the source, so a click\n  // (or tap) on empty slide space NEVER advances — and a section-link click can't be\n  // double-handled into an off-by-one. Arrows ('click'), keys ('keyboard') and the\n  // menu/nav buttons (goTo -> 'api') are untouched.\n  try{\n    const _origAdvance = deck._advance.bind(deck);\n    deck._advance = function(dir, reason){ if(reason==='tap') return; return _origAdvance(dir, reason); };\n  }catch(e){}\n\n  /* ---- navigation wiring ---- */\n  document.getElementById('navPrev').onclick = ()=>deck.goTo((window.__cur||0)-1);\n  document.getElementById('navNext').onclick = ()=>deck.goTo((window.__cur||0)+1);\n  document.addEventListener('click',e=>{ if(e.target.closest('.js-next')) deck.goTo((window.__cur||0)+1); });\n\n  /* ---- build contents menu from data attributes ---- */\n  const parts = {};\n  sections.forEach((s,i)=>{\n    const p = s.dataset.part; if(!p) return;\n    if(!parts[p]) parts[p] = {name:s.dataset.partname||('Part '+p), key:s.dataset.section||('PART '+p), items:[]};\n    if(s.dataset.menu){ parts[p].items.push({label:s.dataset.menu, idx:i}); }\n  });\n  const menuList = document.getElementById('menuList');\n  // Introduction first — jumps to the very first slide of the deck\n  (function(){\n    const wrap=document.createElement('div'); wrap.className='menu-part';\n    wrap.innerHTML='<div class=\"mp-head\" data-idx=\"0\"><span class=\"mp-k\">Intro<\u002Fspan><span class=\"mp-n\">Introduction<\u002Fspan><\u002Fdiv>';\n    menuList.appendChild(wrap);\n  })();\n  Object.keys(parts).sort().forEach(p=>{\n    const P = parts[p];\n    const wrap = document.createElement('div'); wrap.className='menu-part';\n    // section heading jumps to the divider slide for this part (fallback: first item)\n    const headIdx = (dividerIdx[p]!=null) ? dividerIdx[p] : (P.items.length?P.items[0].idx:0);\n    let html = '<div class=\"mp-head\" data-idx=\"'+headIdx+'\"><span class=\"mp-k\">Part '+p+'<\u002Fspan><span class=\"mp-n\">'+P.name+'<\u002Fspan><\u002Fdiv><div class=\"menu-sub\">';\n    P.items.forEach(it=> html += '<a data-idx=\"'+it.idx+'\">'+it.label+'<\u002Fa>');\n    html += '<\u002Fdiv>';\n    wrap.innerHTML = html; menuList.appendChild(wrap);\n  });\n  const panel = document.getElementById('menuPanel');\n  const toggle = document.getElementById('menuToggle');\n  const botbar = document.querySelector('.navgroup .botbar');\n  const openMenu = ()=>{ panel.classList.add('open'); toggle.classList.add('is-hidden'); if(botbar) botbar.classList.add('is-hidden'); };\n  const closeMenu = ()=>{ panel.classList.remove('open'); toggle.classList.remove('is-hidden'); if(botbar) botbar.classList.remove('is-hidden'); };\n  toggle.onclick = openMenu;\n  document.getElementById('menuClose').onclick = closeMenu;\n  panel.addEventListener('click',e=>{ if(e.target===panel) closeMenu();\n    const t=e.target.closest('[data-idx]'); if(t){ deck.goTo(+t.dataset.idx); closeMenu(); } });\n\n  /* ---- product hyperlinks (wrap once, deck-wide) ---- */\n  const PRODUCTS = [\n    ['Chocolate Whey Protein
