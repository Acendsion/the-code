s cortisol production, suppresses testosterone synthesis in the testes, disrupts the GnRH-LH hormonal signaling pathway, dehydrates the skin, provides empty calories (7 kcal/g with zero nutritional value), and impairs muscle protein synthesis by up to 37% in the 24 hours following consumption. If you are serious about transformation, minimize or eliminate alcohol entirely.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CORTISOL MANAGEMENT 2 -->\n<section data-section=\"Part 1 · Foundation\" data-topic=\"Cortisol Management\" data-part=\"1\" data-partname=\"Foundation\" data-label=\"Cortisol Management · Breathing, Nature\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Cortisol management <span class=\"muted\">/ 2<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:36px;\">\n      <div><div class=\"fi-label\">Structured breathing protocols<\u002Fdiv><div class=\"fi-body\">5 minutes of structured breathing daily (box breathing: 4 seconds inhale through nose, 4 seconds hold, 4 seconds exhale through mouth, 4 seconds hold) activates the parasympathetic nervous system via the vagus nerve and measurably reduces salivary cortisol within a single session. Stanford researcher Dr. Andrew Huberman has demonstrated that physiological sighs (double inhale through nose followed by extended exhale through mouth) are particularly effective for acute stress reduction. Do this before bed and after stressful events.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Nature exposure<\u002Fdiv><div class=\"fi-body\">Research published in Frontiers in Psychology shows that just 20 minutes spent in a natural environment (park, forest, waterfront) reduces cortisol by 21% on average. This is not hippie advice — it is measurable, reproducible, and clinically significant. Build outdoor time into your weekly routine.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:34px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\">Our <b>Male Hormone Support<\u002Fb> contains Tongkat Ali (Longjack), Tribulus Terrestris, Zinc, Saw Palmetto, and adaptogenic herbs studied for their role in supporting healthy testosterone levels, reducing cortisol, and promoting hormonal balance. Combined with the sleep and nutrition protocols above, this creates an internal environment where your hormones actively support — rather than sabotage — your transformation.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================================================================== -->\n<!-- ============================ PART 2 ================================= -->\n<!-- ==================================================================== -->\n\n<!-- DIVIDER -->\n<section data-theme=\"dark\" data-nobar=\"\" data-part=\"2\" data-partname=\"Gym\" data-divider=\"2\" data-label=\"02 · Gym\">\n  <div class=\"sec-pill\"><span class=\"pill\">Section 2<\u002Fspan><\u002Fdiv>\n  <div class=\"sec-num\" data-anim=\"\">02<\u002Fdiv>\n  <div class=\"sec-name\" data-anim=\"\" style=\"--d:1;\">Gym <button class=\"circ js-next sec-circ\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 8l-8 8M8 8h8v8\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n  <div class=\"sec-desc\" data-anim=\"\" style=\"--d:2;\">This is not a workout plan you found on Instagram. This is a periodized, evidence-based training system designed to maximize hypertrophy — building muscle in the places that matter most for an aesthetic, powerful physique. Every exercise, every set count, every rest interval is here for a reason backed by research.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- PHILOSOPHY INTRO -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Training Philosophy\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Training Philosophy: Evidence Over Ego\" data-label=\"Philosophy · Evidence Over Ego\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Training Philosophy<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Evidence <span class=\"muted\">over ego.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Muscle growth (hypertrophy) is driven by one primary mechanism: mechanical tension — the force your muscles produce against resistance through a given range of motion, accumulated over time. Volume (total work), intensity (load relative to maximum), and proximity to failure (how close you push each set) are the three controllable variables.<\u002Fp>\n      <p class=\"lead\" data-anim=\"\" style=\"--d:2;margin-top:26px;max-width:24ch;font-weight:600;\">Everything else — pump, soreness, sweat — is noise.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRINCIPLES 1–3 -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"The Principles\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Principles · Overload, Volume, Failure\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The principles <span class=\"muted\">that govern your training / 1–3<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">1<\u002Fspan><br>Progressive overload is king<\u002Fdiv><div class=\"proto-body sm\">Your muscles adapt to stress. To keep growing, you must systematically increase the demand over time — more weight on the bar, more reps at the same weight, or more total sets. Without progressive overload, your body has no reason to change. This is why tracking every single workout is non-negotiable. If you are not progressing week to week, you are maintaining at best and regressing at worst.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">2<\u002Fspan><br>Volume drives growth<\u002Fdiv><div class=\"proto-body sm\">Training volume — measured as hard (challenging) sets per muscle group per week — is the primary modifiable driver of hypertrophy. Current research (Schoenfeld et al., 2017; Krieger, 2010) supports 10–20 hard sets per muscle group per week. Beginners respond well to 10–12 sets; intermediate and advanced lifters may need 15–20+. Critically, distribute this volume across 2–3 sessions per muscle group per week — training a muscle twice per week produces significantly better hypertrophy than once-a-week training at the same total volume.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">3<\u002Fspan><br>Train close to failure, not always to failure<\u002Fdiv><div class=\"proto-body sm\">Leaving 1–3 repetitions in reserve (RIR) on most sets optimizes the stimulus-to-fatigue ratio. A 2022 meta-analysis by Robinson et al. found that training to within 3 reps of failure produces nearly identical hypertrophy to training to absolute failure, with significantly less systemic fatigue, joint stress, and recovery demand. Reserve true failure for the last set of an exercise, or for isolation movements where injury risk is minimal.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PRINCIPLES 4–6 -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"The Principles\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Principles · ROM, Selection, Rest\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The principles <span class=\"muted\">/ 4–6<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">4<\u002Fspan><br>Full range of motion<\u002Fdiv><div class=\"proto-body sm\">Partial reps reduce the mechanical tension placed on the target muscle and consistently produce inferior hypertrophy outcomes. A 2022 study by Schoenfeld et al. confirmed that full ROM training produces significantly greater muscle growth compared to partial ROM, even when total load is equated. Move through the complete range with control in both the concentric (lifting) and eccentric (lowering) phases. The eccentric phase should be controlled (2–3 seconds) — this is where the majority of muscle damage and subsequent adaptation occurs.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">5<\u002Fspan><br>Exercise selection: stability and stretch<\u002Fdiv><div class=\"proto-body sm\">Modern hypertrophy research emphasizes two factors: stability (producing force without wasting energy on balance) and stretch (loading the muscle in a lengthened position). Machine and cable exercises provide superior stability, allowing you to train closer to failure with less systemic fatigue and injury risk. Exercises that challenge the muscle at long lengths are potent hypertrophy stimuli — incline dumbbell curls, Romanian deadlifts, overhead tricep extensions, deep leg press, cable flies from a low position.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\"><span class=\"numbig\" style=\"font-size:46px;\">6<\u002Fspan><br>Rest 2–3 minutes between compound sets<\u002Fdiv><div class=\"proto-body sm\">Shorter rest intervals (30–60 seconds) do not provide a hypertrophy advantage — this is a myth from the bodybuilding magazines. Schoenfeld et al. (2016) showed that 3-minute rest intervals produced significantly greater strength gains and comparable or superior hypertrophy compared to 1-minute rest. Longer rest allows full recovery of the phosphocreatine energy system, enabling more total volume and mechanical tension. For isolation exercises, 60–90 seconds is sufficient.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROGRAM ARCHITECTURE -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Program Architecture\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Program Architecture: The 12-Week System\" data-label=\"Architecture · The 12-Week System\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">The 12-week system<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:18px;max-width:104ch;color:var(--grey-mid);\">THE CODE uses a Push/Pull/Legs (PPL) split as its primary framework for intermediate and advanced trainees, and an Upper/Lower split for beginners. PPL is the gold standard for hypertrophy because it allows you to train each muscle group twice per week with optimal volume distribution and recovery. The system is structured as a 12-week mesocycle with built-in progressive overload and deload phases.<\u002Fp>\n    <table class=\"t\" data-anim=\"\" style=\"--d:2;margin-top:30px;\">\n      <thead><tr><th style=\"width:28%;\">Level<\u002Fth><th style=\"width:18%;\">Frequency<\u002Fth><th style=\"width:22%;\">Split<\u002Fth><th style=\"width:18%;\">Sets/muscle/week<\u002Fth><th style=\"width:14%;\">Deload<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Beginner (0–12 mo)<\u002Ftd><td>4x / week<\u002Ftd><td>Upper / Lower<\u002Ftd><td>10–12 sets<\u002Ftd><td>Every 6–8 weeks<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Intermediate (1–3 yr)<\u002Ftd><td>5–6x / week<\u002Ftd><td>Push / Pull / Legs<\u002Ftd><td>14–18 sets<\u002Ftd><td>Every 4–6 weeks<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Advanced (3+ yr)<\u002Ftd><td>6x / week<\u002Ftd><td>PPL intensified<\u002Ftd><td>16–22 sets<\u002Ftd><td>Every 3–4 weeks<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BEGINNER INTRO -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Beginner Program\" data-theme=\"dark\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Beginner Program: Upper / Lower\" data-label=\"Beginner · Upper / Lower (4 Days)\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Beginner Program · Upper / Lower · 4 Days<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:22ch;font-size:64px;\">Beginners experience the fastest rate of muscle growth of any training population.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:32px;max-width:96ch;color:#c9c6bd;\">If you have been training less than 12 months consistently, this is your program. Do not skip ahead — \"newbie gains\" mean you do not need advanced volume or intensity techniques. What you need is consistency, progressive overload on fundamental movement patterns, and mastery of proper technique. Run this program for 12 weeks before evaluating whether to advance.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- UPPER A -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Upper A (Monday)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Beginner · Upper A\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Upper A <span class=\"muted\">— Monday<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:26%;\">Exercise<\u002Fth><th style=\"width:8%;\">Sets<\u002Fth><th style=\"width:10%;\">Reps<\u002Fth><th style=\"width:12%;\">Rest<\u002Fth><th style=\"width:44%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Barbell bench press<\u002Ftd><td>4<\u002Ftd><td>6–8<\u002Ftd><td>2–3 min<\u002Ftd><td>Primary chest compound. Full ROM, controlled 2-sec eccentric. Drive through feet.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Dumbbell row (each arm)<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>Full stretch at bottom, squeeze scapula at top. No torso rotation.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated DB shoulder press<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>Slight lean back for stability. Full overhead lockout.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Lat pulldown (wide grip)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Pull to upper chest. Lean back slightly. Squeeze lats at bottom.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Incline dumbbell curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>30° incline. Full stretch at bottom — bicep long head emphasis.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Overhead cable tricep ext.<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Face away from cable. Full stretch behind head. Elbows fixed.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LOWER A -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Lower A (Tuesday)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Beginner · Lower A\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Lower A <span class=\"muted\">— Tuesday<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:26%;\">Exercise<\u002Fth><th style=\"width:8%;\">Sets<\u002Fth><th style=\"width:10%;\">Reps<\u002Fth><th style=\"width:12%;\">Rest<\u002Fth><th style=\"width:44%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Barbell squat<\u002Ftd><td>4<\u002Ftd><td>6–8<\u002Ftd><td>3 min<\u002Ftd><td>Below parallel depth. Brace core. Full ROM is non-negotiable.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Romanian deadlift<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2–3 min<\u002Ftd><td>Hip hinge. Bar close to legs. Feel hamstring stretch. Slight knee bend.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg press<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>2 min<\u002Ftd><td>Deep range. Feet shoulder width, mid-platform. No locking knees.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg curl (seated or lying)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Full stretch and full contraction. Slow eccentric (3 sec).<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Standing calf raise<\u002Ftd><td>4<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Full stretch at bottom (2 sec), pause at top (1 sec). Full ROM.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Plank / Ab rollout<\u002Ftd><td>3<\u002Ftd><td>30–60s<\u002Ftd><td>60 sec<\u002Ftd><td>Core stability. Brace hard. Neutral spine throughout.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- UPPER B -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Upper B (Thursday)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Beginner · Upper B\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Upper B <span class=\"muted\">— Thursday<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:26%;\">Exercise<\u002Fth><th style=\"width:8%;\">Sets<\u002Fth><th style=\"width:10%;\">Reps<\u002Fth><th style=\"width:12%;\">Rest<\u002Fth><th style=\"width:44%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Incline dumbbell press<\u002Ftd><td>4<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>30° incline. Upper chest emphasis. Touch dumbbells at top.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated cable row (close)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>2 min<\u002Ftd><td>Full stretch forward, squeeze scapulae together at back.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Lateral raise (dumbbell)<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Slight forward lean. Controlled. Do not swing.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Pull-ups or assisted<\u002Ftd><td>3<\u002Ftd><td>6–10<\u002Ftd><td>2 min<\u002Ftd><td>Full dead hang to chin over bar. Slow negative.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hammer curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Neutral grip. Brachialis and brachioradialis — forearm width.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Tricep pushdown (rope)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Spread the rope at bottom for peak contraction. Elbows locked.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LOWER B -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Lower B (Friday)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Beginner · Lower B\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Lower B <span class=\"muted\">— Friday<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:26px;\">\n      <thead><tr><th style=\"width:26%;\">Exercise<\u002Fth><th style=\"width:8%;\">Sets<\u002Fth><th style=\"width:10%;\">Reps<\u002Fth><th style=\"width:12%;\">Rest<\u002Fth><th style=\"width:44%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Leg press (feet high/wide)<\u002Ftd><td>4<\u002Ftd><td>8–10<\u002Ftd><td>2–3 min<\u002Ftd><td>Feet high on platform, wide stance — glute and hamstring emphasis.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bulgarian split squat<\u002Ftd><td>3<\u002Ftd><td>8–10/leg<\u002Ftd><td>2 min<\u002Ftd><td>Deep stretch at bottom. Rear foot elevated on bench. Balance focus.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg extension<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Quad isolation. Full lockout at top. Squeeze for 1 second.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated leg curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Full ROM. Slow 3-second eccentric. Feel the hamstring stretch.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated calf raise<\u002Ftd><td>4<\u002Ftd><td>15–20<\u002Ftd><td>60 sec<\u002Ftd><td>Soleus focus. Deep stretch. Pause at bottom for 2 seconds.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hanging leg raise<\u002Ftd><td>3<\u002Ftd><td>10–15<\u002Ftd><td>60 sec<\u002Ftd><td>Control the movement — no swinging. Bring knees to chest.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BEGINNER PROGRESSION + PRODUCT -->\n<section data-section=\"Part 2 · Gym · Beginner\" data-topic=\"Progression Model\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Beginner · Linear Progression\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Beginner Progression Model<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Linear<br>progression.<\u002Fh1>\n      <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:24px;max-width:30ch;color:var(--grey-mid);\">If you are not tracking, you are guessing.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Use linear progression. Add 2.5 kg to all compound lifts (bench, squat, row, overhead press) every 1–2 weeks when you can complete all sets at the top of the rep range with proper form and 1–2 RIR. For isolation exercises, add reps first (when you hit the top of the range across all sets), then add the smallest weight increment available. Track every session in a notebook or app.<\u002Fp>\n      <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:28px;\">\n        <span class=\"diam\"><\u002Fspan>\n        <div class=\"ptext\">Our <b>Fruit Punch Pre-Workout<\u002Fb> provides clinically dosed caffeine, L-citrulline (for nitric oxide and blood flow), and beta-alanine (for muscular endurance). Use on days when energy is low — not every session. Your body should not need stimulants to train. Reserve it for your hardest sessions.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTERMEDIATE INTRO -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Intermediate Program\" data-theme=\"dark\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Intermediate Program: PPL\" data-label=\"Intermediate · Push / Pull / Legs (5–6 Days)\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Intermediate Program · Push / Pull / Legs · 5–6 Days<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:24ch;font-size:60px;\">Greater volume, higher frequency, more exercise variety.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:98ch;color:#c9c6bd;\">Once you have built a solid foundation of strength, movement quality, and mind-muscle connection (roughly 12+ months of consistent training), the PPL split allows greater volume per muscle group, higher training frequency, and more exercise variety. Run as PPL-rest-PPL or PPL-PPL-rest depending on your recovery capacity and schedule.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PUSH A -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Push A (Chest &amp; Triceps)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Push A\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Push A <span class=\"muted\">— chest &amp; triceps focus<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Flat barbell bench press<\u002Ftd><td>4<\u002Ftd><td>5–7<\u002Ftd><td>3 min<\u002Ftd><td>Strength focus. Progressive overload priority. Full ROM.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Incline DB press (30°)<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>Upper chest hypertrophy. Touch at top, stretch at bottom.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Machine chest fly / Pec deck<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Full stretch. Squeeze at peak contraction. Isolation.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated DB shoulder press<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>Full overhead lockout. Controlled negative.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Cable lateral raise<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Constant cable tension. Side delt width builder.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Overhead cable tricep ext.<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Long head stretch. Face away from cable stack.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Tricep dip (weighted)<\u002Ftd><td>3<\u002Ftd><td>8–12<\u002Ftd><td>90 sec<\u002Ftd><td>Lean forward for more chest, upright for tricep emphasis.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PULL A -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Pull A (Back &amp; Biceps)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Pull A\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Pull A <span class=\"muted\">— back &amp; biceps focus<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Barbell row (overhand)<\u002Ftd><td>4<\u002Ftd><td>6–8<\u002Ftd><td>2–3 min<\u002Ftd><td>Strength focus. Core tight. Pull to lower chest.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Weighted pull-ups<\u002Ftd><td>3<\u002Ftd><td>6–8<\u002Ftd><td>2–3 min<\u002Ftd><td>Full dead hang. Chin over bar. Add weight progressively.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Chest-supported row<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Machine or incline bench. No lower back fatigue. Pure back.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Cable face pull<\u002Ftd><td>3<\u002Ftd><td>15–20<\u002Ftd><td>60 sec<\u002Ftd><td>Rear delts and external rotators. Posture health.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Incline dumbbell curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Stretched position. Bicep long head. Slow eccentric.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Barbell curl (standing)<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>60 sec<\u002Ftd><td>Strict form. No momentum. Controlled throughout.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LEGS A -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Legs A (Quad Focus)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Legs A\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Legs A <span class=\"muted\">— quad focus<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Barbell back squat<\u002Ftd><td>4<\u002Ftd><td>5–7<\u002Ftd><td>3 min<\u002Ftd><td>Below parallel. Strength priority. Brace and drive.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hack squat or Leg press<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2–3 min<\u002Ftd><td>Deep range of motion. Quad emphasis. Controlled negative.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg extension<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Full lockout. Peak contraction hold. Isolation finisher.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Romanian deadlift<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2–3 min<\u002Ftd><td>Hamstring stretch. Hip hinge pattern. Bar close to legs.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated leg curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Slow 3-second eccentric phase. Full ROM.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Standing calf raise<\u002Ftd><td>4<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Full ROM. 2-sec pause at stretch. Progressive overload.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Cable crunch or Ab wheel<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Loaded core work. Controlled. No jerking.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PUSH B -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Push B (Shoulder &amp; Upper Chest)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Push B\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Push B <span class=\"muted\">— shoulder &amp; upper chest<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Overhead press (BB or DB)<\u002Ftd><td>4<\u002Ftd><td>6–8<\u002Ftd><td>2–3 min<\u002Ftd><td>Strength focus. Standing or seated. Full lockout.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Incline smith machine press<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>30° incline. Upper chest. Stable for close-to-failure.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Cable fly (low to high)<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Upper chest focus. Full adduction at top.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Dumbbell lateral raise<\u002Ftd><td>4<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Side delt width builder. Slight forward lean.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Reverse pec deck<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Rear delt. Posture balance. External rotation health.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Close-grip bench or Skull.<\u002Ftd><td>3<\u002Ftd><td>8–10<\u002Ftd><td>90 sec<\u002Ftd><td>Tricep mass builder. Full ROM.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PULL B -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Pull B (Width &amp; Rear Delt)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Pull B\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Pull B <span class=\"muted\">— width &amp; rear delt<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:24px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Wide-grip lat pulldown<\u002Ftd><td>4<\u002Ftd><td>8–10<\u002Ftd><td>2 min<\u002Ftd><td>Back width. Full stretch at top. Pull to upper chest.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated cable row (close)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>90 sec<\u002Ftd><td>Back thickness. Full stretch forward, squeeze back.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Single-arm DB row<\u002Ftd><td>3<\u002Ftd><td>8–10/arm<\u002Ftd><td>90 sec<\u002Ftd><td>Full ROM. Let the lat stretch. Unilateral balance.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Cable face pull<\u002Ftd><td>3<\u002Ftd><td>15–20<\u002Ftd><td>60 sec<\u002Ftd><td>Rear delts. Rotator cuff health. Posture insurance.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hammer curl (cable or DB)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Brachialis. Forearm width and thickness.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Preacher or Spider curl<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>60 sec<\u002Ftd><td>Bicep short head isolation. Full stretch at bottom.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- LEGS B -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Legs B (Posterior Chain)\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Legs B\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Legs B <span class=\"muted\">— posterior chain<\u002Fspan><\u002Fh2>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:1;margin-top:22px;\">\n      <thead><tr><th style=\"width:27%;\">Exercise<\u002Fth><th style=\"width:7%;\">Sets<\u002Fth><th style=\"width:9%;\">Reps<\u002Fth><th style=\"width:11%;\">Rest<\u002Fth><th style=\"width:46%;\">Notes<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Romanian deadlift<\u002Ftd><td>4<\u002Ftd><td>6–8<\u002Ftd><td>3 min<\u002Ftd><td>Hamstring and glute. Strength focus. Hip hinge mastery.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Bulgarian split squat<\u002Ftd><td>3<\u002Ftd><td>8–10/leg<\u002Ftd><td>2 min<\u002Ftd><td>Deep stretch. Unilateral balance. Glute activation.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg press (feet high/wide)<\u002Ftd><td>3<\u002Ftd><td>10–12<\u002Ftd><td>2 min<\u002Ftd><td>Glute and hamstring bias. Deep ROM.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Nordic curl or GHR<\u002Ftd><td>3<\u002Ftd><td>6–10<\u002Ftd><td>90 sec<\u002Ftd><td>Eccentric hamstring strength. Injury prevention.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Leg extension<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Quad balance. Full lockout.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Seated calf raise<\u002Ftd><td>4<\u002Ftd><td>15–20<\u002Ftd><td>60 sec<\u002Ftd><td>Soleus focus. Deep stretch. Slow and controlled.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Hanging leg raise<\u002Ftd><td>3<\u002Ftd><td>12–15<\u002Ftd><td>60 sec<\u002Ftd><td>Lower ab focus. No swinging. Control.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INTERMEDIATE PROGRESSION -->\n<section data-section=\"Part 2 · Gym · Intermediate\" data-topic=\"Progression Model\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Intermediate · Double Progression\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">Intermediate Progression Model<\u002Fdiv>\n    <h2 class=\"mid\" data-anim=\"\" style=\"--d:1;margin-top:16px;\">Double progression.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:28px;max-width:80ch;\">When you hit the top of the rep range across all sets with 1–2 RIR (reps in reserve), increase the load by 2.5–5 kg on compound movements and 1–2.5 kg on isolation exercises. Additionally, add 1 set per muscle group every 2–3 weeks to progressively increase volume until you reach your maximum recoverable volume (MRV), then deload and restart the volume ramp at minimum effective volume (MEV).<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ADVANCED INTRO -->\n<section data-section=\"Part 2 · Gym · Advanced\" data-topic=\"Advanced Program\" data-theme=\"dark\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Advanced Program: Block Periodization\" data-label=\"Advanced · Intensified PPL + Block Periodization\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Advanced Program · Intensified PPL + Block Periodization<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:24ch;font-size:60px;\">Three 4-week blocks, each with a distinct focus.<\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:96ch;color:#c9c6bd;\">The advanced program follows the same PPL exercise structure but introduces intensity techniques and block periodization. Over 12 weeks, you cycle through three 4-week blocks, each with a distinct focus. This prevents plateaus, manages fatigue, and ensures continuous adaptation.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- BLOCK PERIODIZATION CARDS -->\n<section data-section=\"Part 2 · Gym · Advanced\" data-topic=\"Block Periodization\" data-part=\"2\" data-partname=\"Gym\" data-label=\"Advanced · The Three Blocks + Deload\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">The 12-week mesocycle<\u002Fh2>\n    <div class=\"cardrow c2\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Block 1 · Weeks 1–4<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:10px;font-size:25px;\">Accumulation<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">High volume phase. 18–22 sets per muscle group per week. Rep ranges of 8–15. RIR of 2–3. Focus on building work capacity and maximizing time under tension. Use straight sets and controlled tempos (2-0-2 or 3-0-1). No intensity techniques — pure volume accumulation. This block builds the foundation of fatigue that the next block converts into strength and size gains.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Block 2 · Weeks 5–8<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:10px;font-size:25px;\">Intensification<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Moderate volume, higher intensity. 14–18 sets per muscle group per week. Rep ranges of 5–10. RIR of 1–2. Increase loads significantly compared to Block 1. Introduce intensity techniques: rest-pause sets on the last set of 1–2 exercises per session. Drop sets on isolation movements (reduce weight by 20–30%, immediately continue to failure). Mechanical drop sets where appropriate.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"kicker\" style=\"color:var(--grey-mid);\">Block 3 · Weeks 9–11<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:10px;font-size:25px;\">Realization<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Low volume, peak intensity. 12–15 sets per muscle group per week. Rep ranges of 3–8 on compounds, 8–12 on isolation. RIR of 0–1. Test new personal records on all major compound lifts. Use myoreps for isolation work — set to failure at 60% 1RM, rest 5 breaths, perform 3–5 reps, repeat for 3–5 mini-sets — to maintain volume efficiently with minimal time and fatigue.<\u002Fp><\u002Fdiv>\n      <div class=\"card d\"><div class=\"kicker\" style=\"color:#9b988f;\">Week 12<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:10px;font-size:25px;\">Strategic Deload<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Reduce total volume by 50% and intensity (load) by 30–40%. Maintain training frequency (6 days). Same exercises, same tempo, significantly less weight and fewer sets. This is not a week off — it is a strategic recovery phase that lets accumulated fatigue dissipate at the muscular, neural, and connective tissue levels so you begin the next 12-week cycle stronger, healthier, and more responsive.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CARDIO -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Cardio\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Cardio: When, How &amp; How Much\" data-label=\"Cardio · When, How &amp; How Much\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Cardio <span class=\"muted\">— when, how &amp; how much<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:16px;max-width:104ch;color:var(--grey-mid);\">Cardiovascular training is essential for heart health, blood pressure, nutrient and oxygen delivery, mental health, and fat loss during cutting phases. However, excessive cardio — particularly HIIT — can interfere with hypertrophy through the \"interference effect.\" The key is choosing the right type and placing it strategically.<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <thead><tr><th style=\"width:20%;\">Type<\u002Fth><th style=\"width:16%;\">Frequency<\u002Fth><th style=\"width:16%;\">Duration<\u002Fth><th style=\"width:24%;\">When<\u002Fth><th style=\"width:24%;\">Purpose<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">Walking (LISS)<\u002Ftd><td>Daily<\u002Ftd><td>20–45 min<\u002Ftd><td>Any time (great post-meal)<\u002Ftd><td>Fat oxidation, active recovery, NEAT boost, mental health<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">Incline treadmill<\u002Ftd><td>2–3x/week<\u002Ftd><td>20–30 min<\u002Ftd><td>After lifting or separate day<\u002Ftd><td>Moderate calorie burn, low interference with hypertrophy<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">HIIT (sprints, bike)<\u002Ftd><td>1–2x/week max<\u002Ftd><td>15–20 min<\u002Ftd><td>Separate day from legs<\u002Ftd><td>VO2max improvement, cardiovascular power, time-efficient<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:3;margin-top:30px;\">\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">When bulking<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">2–3 sessions of low-intensity cardio per week (walking, incline treadmill) for cardiovascular health and nutrient partitioning. Avoid high-volume HIIT during surplus phases — it burns calories you need for growth and increases cortisol.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">When cutting<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Increase to 4–6 sessions per week, primarily LISS. Walking 8,000–12,000 steps daily is the most underrated and sustainable fat loss tool — 300–500 additional calories per day without increasing cortisol, appetite, or recovery demands. Add HIIT only if fat loss stalls. Always prioritize diet over cardio for creating a deficit.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- RECOVERY & DELOAD -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Recovery &amp; Deload\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Recovery, Deload &amp; Injury Prevention\" data-label=\"Recovery · Deload &amp; Active Recovery\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Recovery, deload <span class=\"muted\">&amp; injury prevention<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Deloading<\u002Fdiv><div class=\"proto-body sm\">Every 3–6 weeks (depending on training level and fatigue), implement a deload week. Signs you need to deload: strength regression across multiple sessions, persistent joint pain or tendon soreness, poor sleep despite good habits, loss of motivation and enjoyment of training, elevated resting heart rate (an increase of 5+ bpm from baseline upon waking), and a general feeling of being \"run down\" or getting sick frequently.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Active recovery on rest days<\u002Fdiv><div class=\"proto-body sm\">Do not be sedentary on rest days. Light walking (20–30 minutes), mobility work, and foam rolling all promote blood flow to recovering muscles, reduce delayed onset muscle soreness (DOMS), and maintain range of motion without adding training stress. Avoid the temptation to turn rest days into cardio sessions — rest means rest from intense training.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Foam rolling protocol<\u002Fdiv><div class=\"proto-body sm\">10 minutes, rest days or post-training. Spend 60–90 seconds on each major muscle group, rolling slowly until you find a tender spot, then hold pressure for 20–30 seconds. Target: quads, IT band, glutes, upper back (thoracic spine), lats, and calves. Foam rolling does not \"break up fascia\" — it works by reducing neural tone in tight muscles and increasing pain tolerance to stretch, allowing greater range of motion.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- STRETCHING & MOBILITY -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Stretching &amp; Mobility\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Stretching &amp; Mobility Protocol\" data-label=\"Stretching &amp; Mobility Protocol\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Stretching <span class=\"muted\">&amp; mobility protocol<\u002Fspan><\u002Fh2>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:1;margin-top:28px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Post-training static stretching<\u002Fdiv><div class=\"proto-body sm\">5–8 minutes. Static stretching should be performed after training, never before (pre-training static stretching reduces force production by 5–10%). Hold each stretch for 30–60 seconds. Focus on the muscles trained that session. Key stretches: standing quad stretch, standing hamstring stretch, doorway pec stretch, overhead tricep stretch, cross-body shoulder stretch, and hip flexor lunge stretch.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Daily mobility routine<\u002Fdiv><div class=\"proto-body sm\">5 minutes, every morning or pre-training. Cat-cow spinal mobilization (10 reps), thoracic spine rotations on all fours (8 each side), hip 90/90 switches (8 each side), wall slides for scapular mobility (10 reps), deep bodyweight squat hold (30 seconds). This routine addresses the most common mobility restrictions in men who sit at desks and prevents the postural deterioration that undermines your confidence.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Hip flexor priority<\u002Fdiv><div class=\"proto-body sm\">Tight hip flexors from prolonged sitting cause anterior pelvic tilt (lower belly protrusion, flat glutes, lower back compression) and inhibit glute activation. The half-kneeling hip flexor stretch (back knee on ground, squeeze the glute of the back leg, drive hips forward — hold 60 seconds each side) should be performed daily. This single stretch will improve your squat depth, reduce lower back pain, and visually improve your standing posture within 2–3 weeks.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WARM-UP -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Warm-Up Protocol\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Warm-Up Protocol\" data-label=\"Warm-Up Protocol · Every Session\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Warm-up protocol <span class=\"muted\">— every session<\u002Fspan><\u002Fh2>\n    <div class=\"cardrow\" data-anim=\"\" style=\"--d:1;margin-top:34px;\">\n      <div class=\"card\"><div class=\"numbig\" style=\"font-size:54px;\">1<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:14px;font-size:24px;\">General warm-up<\u002Fdiv><div class=\"bodytext sm\" style=\"color:var(--grey-mid);margin-top:6px;\">3–5 min<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Light cardio (incline walking, cycling, or rowing) to elevate heart rate and increase core temperature. This increases blood flow to muscles, improves neural conductivity, and reduces injury risk.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"numbig\" style=\"font-size:54px;\">2<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:14px;font-size:24px;\">Dynamic stretching<\u002Fdiv><div class=\"bodytext sm\" style=\"color:var(--grey-mid);margin-top:6px;\">2–3 min<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Leg swings (forward/back and side-to-side, 10 each), arm circles (10 forward, 10 backward), bodyweight squats (10), walking lunges (10), inchworms (5). This prepares the specific joints and movement patterns for the session ahead.<\u002Fp><\u002Fdiv>\n      <div class=\"card\"><div class=\"numbig\" style=\"font-size:54px;\">3<\u002Fdiv><div class=\"fi-label\" style=\"margin-top:14px;font-size:24px;\">Progressive warm-up sets<\u002Fdiv><div class=\"bodytext sm\" style=\"color:var(--grey-mid);margin-top:6px;\">3–4 sets<\u002Fdiv><p class=\"bodytext sm\" style=\"margin-top:12px;\">Before your first working exercise: 1x12 at 40% of working weight, 1x8 at 60%, 1x5 at 75%, 1x3 at 85%. These calibrate your nervous system and prepare tendons and ligaments. Never go directly from zero to your working weight — the most common cause of gym injuries.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- INJURY PREVENTION -->\n<section data-section=\"Part 2 · Gym\" data-topic=\"Injury Prevention\" data-part=\"2\" data-partname=\"Gym\" data-menu=\"Injury Prevention Principles\" data-label=\"Injury Prevention Principles\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Injury prevention <span class=\"muted\">principles<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:32px;\">\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Never skip warm-ups<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Five minutes of preparation prevents weeks of forced rest from injury.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Form over weight, always<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Ego lifting — loading more weight than you can control through full range of motion — is the number one cause of gym injuries. A controlled rep at a lighter weight produces more muscle growth than a sloppy rep at a heavier weight.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Shoulder health<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Include face pulls and external rotation work in every Pull session. The rotator cuff is the most commonly injured structure in lifters, and it is preventable. 3 sets of 15–20 reps of face pulls costs you 4 minutes and protects your shoulders for decades.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Posterior chain<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Strengthen the hamstrings, glutes, and lower back (Romanian deadlifts, leg curls, hip thrusts if desired). A strong posterior chain prevents ACL injuries, lower back strains, and the anterior-dominant imbalances that are endemic in gym culture.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\"><b>Listen to pain signals —<\u002Fb> distinguish between muscle soreness (normal, bilateral, dissipates with movement) and joint or tendon pain (sharp, localized, worsens with specific movements). Train through soreness. Never train through joint pain. If pain persists for more than 72 hours, consult a physiotherapist before continuing to load that area.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================================================================== -->\n<!-- ============================ PART 3 ================================= -->\n<!-- ==================================================================== -->\n\n<!-- DIVIDER -->\n<section data-theme=\"dark\" data-nobar=\"\" data-part=\"3\" data-partname=\"Looks\" data-divider=\"3\" data-label=\"03 · Looks\">\n  <div class=\"sec-pill\"><span class=\"pill\">Section 3<\u002Fspan><\u002Fdiv>\n  <div class=\"sec-num\" data-anim=\"\">03<\u002Fdiv>\n  <div class=\"sec-name\" data-anim=\"\" style=\"--d:1;\">Looks <button class=\"circ js-next sec-circ\"><svg viewBox=\"0 0 24 24\"><path d=\"M16 8l-8 8M8 8h8v8\"><\u002Fpath><\u002Fsvg><\u002Fbutton><\u002Fdiv>\n  <div class=\"sec-desc\" data-anim=\"\" style=\"--d:2;\">Your appearance is a signal. It communicates discipline, health, and self-respect before you say a single word. Research in social perception consistently shows that people form first impressions within 100 milliseconds — and those impressions are overwhelmingly based on visual cues. This section is built on dermatological science and evidence-based grooming, not social media trends or pseudoscience.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ATTRACTIVENESS 1 -->\n<section data-section=\"Part 3 · Looks\" data-topic=\"The Science of Attractiveness\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"The Science of Male Attractiveness\" data-label=\"Attractiveness · The Markers\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">The Science of Male Attractiveness<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Measurable, <span class=\"muted\">not subjective.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Research in evolutionary psychology and social perception consistently identifies the same markers of male attractiveness across all studied cultures: clear, even skin tone; a lean face with visible bone structure (jawline and cheekbones); healthy, thick hair; upright posture that signals physical capability; a muscular but proportionate physique; and grooming that indicates attention to detail. These are not subjective opinions — they are measurable features that influence how others perceive you in social, romantic, and professional contexts.<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:60ch;\">A landmark study published in Evolution and Human Behavior found that women rate men with clear skin as significantly more attractive than men with visible skin imperfections, even when facial structure was identical. Research on the \"halo effect\" demonstrates that physically attractive individuals are perceived as more competent, trustworthy, and socially skilled — leading to measurable advantages in hiring decisions, salary negotiations, social influence, and romantic opportunity.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ATTRACTIVENESS 2 -->\n<section data-section=\"Part 3 · Looks\" data-topic=\"The Science of Attractiveness\" data-theme=\"dark\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Attractiveness · The Critical Insight\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">The Critical Insight<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:22ch;font-size:62px;\">The vast majority of these markers are modifiable.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:32px;max-width:80ch;color:#c9c6bd;\">Skin clarity is a function of skincare, nutrition, hydration, and sleep. Facial leanness comes from body composition (covered in Foundation and Gym). Posture is trainable. Hair health responds to nutrition and topical compounds. Style is a learnable skill. You are not stuck with the hand genetics dealt you — you can optimize every variable within your potential. And when every variable is optimized simultaneously, the compound effect is dramatic.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SKINCARE INTRO -->\n<section data-section=\"Part 3 · Looks\" data-topic=\"Skincare\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Skincare: Your Daily Non-Negotiable\" data-label=\"Skincare · Your Daily Non-Negotiable\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Skincare<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Your daily <span class=\"muted\">non-negotiable.<\u002Fspan><\u002Fh1>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:60ch;\">Men's skin is approximately 25% thicker than women's, produces significantly more sebum (oil), has larger pores, and is more prone to textural irregularities and ingrown hairs from shaving. This means male skin is more resilient to environmental damage but also more prone to oiliness, clogged pores, and inflammation if not properly maintained.<\u002Fp>\n      <p class=\"lead\" data-anim=\"\" style=\"--d:2;margin-top:24px;max-width:30ch;font-weight:600;\">A simple routine done daily always outperforms a complicated one done sporadically.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MORNING PROTOCOL -->\n<section data-section=\"Part 3 · Looks · Skincare\" data-topic=\"Morning Protocol\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Morning Protocol\" data-label=\"Skincare · Morning Protocol\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Morning protocol <span class=\"muted\">— protection &amp; hydration<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:100ch;color:var(--grey-mid);\">Your skin faces UV radiation, pollution particulates, and environmental oxidative stress during the day. The morning routine creates a shield.<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <thead><tr><th style=\"width:6%;\">Step<\u002Fth><th style=\"width:24%;\">Product<\u002Fth><th style=\"width:38%;\">Why<\u002Fth><th style=\"width:32%;\">How<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">1<\u002Ftd><td class=\"lead-cell\">Gentle cleanser<\u002Ftd><td>Remove overnight sebum, dead cells, sweat without stripping barrier<\u002Ftd><td>Massage on damp skin in circular motions for 30–60 sec, rinse lukewarm<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">2<\u002Ftd><td class=\"lead-cell\">Vitamin C serum (opt.)<\u002Ftd><td>L-ascorbic acid provides antioxidant protection against UV and pollution<\u002Ftd><td>3–4 drops, pat onto face and neck, wait 1 min before next step<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">3<\u002Ftd><td class=\"lead-cell\">Lightweight moisturizer<\u002Ftd><td>Restore and seal the moisture barrier, prevent transepidermal water loss<\u002Ftd><td>Apply evenly to face and neck with upward strokes<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">4<\u002Ftd><td class=\"lead-cell\">SPF 30–50 broad spectrum<\u002Ftd><td>Prevent UV-induced collagen breakdown, hyperpigmentation, DNA damage<\u002Ftd><td>Apply generously (1/4 tsp for face). Reapply every 2h in direct sun<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY SPF -->\n<section data-section=\"Part 3 · Looks · Skincare\" data-topic=\"Why SPF Is Non-Negotiable\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Skincare · Why SPF Is Non-Negotiable\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Why SPF Is Non-Negotiable<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">80% <span class=\"muted\">of visible aging is the sun.<\u002Fspan><\u002Fh1>\n      <div class=\"statrow\" data-anim=\"\" style=\"--d:2;margin-top:40px;\">\n        <div><div class=\"sv\">24%<\u002Fdiv><div class=\"sl\">Less skin aging in daily SPF users (4.5-yr study)<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"sv\">UVA<\u002Fdiv><div class=\"sl\">Penetrates clouds and glass year-round<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Ultraviolet radiation is responsible for up to 80% of all visible skin aging (photoaging). UVA rays (which penetrate clouds and glass) break down collagen and elastin fibers, cause hyperpigmentation and uneven skin tone, increase wrinkle depth and skin laxity, and damage the DNA of skin cells (increasing cancer risk).<\u002Fp>\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:58ch;\">Wearing daily SPF is the single highest-impact anti-aging action you can take — more impactful than any serum, treatment, or procedure. A 2013 study in Annals of Internal Medicine followed 900 adults over 4.5 years and found that daily sunscreen users showed 24% less skin aging than occasional users. This applies on cloudy days, in winter, and indoors near windows.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EVENING PROTOCOL -->\n<section data-section=\"Part 3 · Looks · Skincare\" data-topic=\"Evening Protocol\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Evening Protocol\" data-label=\"Skincare · Evening Protocol\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Evening protocol <span class=\"muted\">— repair &amp; regeneration<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:100ch;color:var(--grey-mid);\">Your skin's cell turnover rate, collagen synthesis, and blood flow all peak during sleep. This is when active ingredients like retinol and peptides do their most impactful work.<\u002Fp>\n    <table class=\"t compact\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n      <thead><tr><th style=\"width:6%;\">Step<\u002Fth><th style=\"width:26%;\">Product<\u002Fth><th style=\"width:36%;\">Why<\u002Fth><th style=\"width:32%;\">How<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td class=\"lead-cell\">1<\u002Ftd><td class=\"lead-cell\">Cleanser (oil-based first if SPF)<\u002Ftd><td>Remove sunscreen, sebum, pollution, environmental residue<\u002Ftd><td>Double cleanse: oil cleanser dissolves SPF, gentle wash cleans skin<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">2<\u002Ftd><td class=\"lead-cell\">Peptide + Retinol serum<\u002Ftd><td>Stimulate collagen synthesis, smooth texture, reduce fine lines, firm<\u002Ftd><td>3–4 drops on clean, dry face and neck. Avoid direct eye area.<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">3<\u002Ftd><td class=\"lead-cell\">Eye cream (peptide-based)<\u002Ftd><td>Hydrate thin under-eye skin, reduce puffiness and dark circles<\u002Ftd><td>Small amount patted gently with ring finger around orbital bone<\u002Ftd><\u002Ftr>\n        <tr><td class=\"lead-cell\">4<\u002Ftd><td class=\"lead-cell\">Moisturizer (richer formula)<\u002Ftd><td>Lock in active ingredients, support overnight barrier repair<\u002Ftd><td>Apply generously to face and neck. Seal everything in.<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EVENING PRODUCTS -->\n<section data-section=\"Part 3 · Looks · Skincare\" data-topic=\"Evening Products\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Product · Evening Skincare\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\">The Product Stack<\u002Fdiv>\n    <h2 class=\"mid\" data-anim=\"\" style=\"--d:1;margin-top:16px;\">The evening repair duo.<\u002Fh2>\n    <div class=\"stack gap-s\" data-anim=\"\" style=\"--d:2;margin-top:30px;\">\n      <div class=\"product\"><span class=\"diam\"><\u002Fspan><div class=\"ptext\">Our <b>Peptide Face Serum<\u002Fb> combines retinol with Hexapeptide-11 (which supports the appearance of firmness), phospholipids (moisture barrier support), bisabolol (calming), and caprylic/capric triglyceride (lightweight conditioning) — a complete evening formula for collagen stimulation, texture refinement, and barrier support in one application. Apply nightly and follow with moisturizer. Use sunscreen the morning after application.<\u002Fdiv><\u002Fdiv>\n      <div class=\"product\"><span class=\"diam\"><\u002Fspan><div class=\"ptext\">Our <b>Peptide Eye-Gel Cream<\u002Fb> targets the orbital area — the thinnest and most delicate skin on your face — with peptides and hydrating agents that reduce the appearance of dark circles, puffiness, and fine lines. This is the area that most visibly reveals lack of sleep, stress, dehydration, and aging.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WEEKLY TREATMENTS -->\n<section data-section=\"Part 3 · Looks · Skincare\" data-topic=\"Weekly Treatments\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Weekly Treatments\" data-label=\"Skincare · Weekly Treatments\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Weekly treatments<\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:36px;\">\n      <div><div class=\"fi-label\">Chemical exfoliation · 1–2x per week<\u002Fdiv><div class=\"fi-body\">Use a BHA (salicylic acid, 2%) if you have oily or acne-prone skin — BHA is oil-soluble and penetrates into pores to dissolve sebum plugs and prevent breakouts. Use an AHA (glycolic acid, 5–10%) if you have normal-to-dry skin — AHA works on the skin surface to dissolve dead cells and improve texture. Do not over-exfoliate (more than 2x per week) — this compromises the skin barrier, increases sensitivity, and triggers rebound oil production. Apply on evenings when you are not using retinol to avoid irritation.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Hydrating mask · 1x per week<\u002Fdiv><div class=\"fi-body\">A hyaluronic acid or ceramide-based sheet mask or leave-on mask deeply hydrates the skin and supports barrier recovery. Apply for 15–20 minutes on clean skin, then follow with your regular evening moisturizer. Particularly beneficial during dry winter months, after air travel, or during periods of increased retinol use when the skin is adapting.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- DARK SPOTS -->\n<section data-section=\"Part 3 · Looks · Targeted Concerns\" data-topic=\"Dark Spots &amp; Hyperpigmentation\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Targeted Concerns: Dark Spots, Acne, Hair\" data-label=\"Targeted · Dark Spots &amp; Hyperpigmentation\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Targeted Concerns<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Dark spots &amp; <span class=\"muted\">hyperpigmentation.<\u002Fspan><\u002Fh1>\n      <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:2;margin-top:22px;max-width:32ch;color:var(--grey-mid);\">Results require patience — expect 8–12 weeks of consistent use for visible improvement.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Post-inflammatory hyperpigmentation (PIH) from acne scars, sun damage, or skin irritation is one of the most common skin concerns among men. The evidence-based treatment combines three strategies: daily SPF to prevent UV from darkening existing spots, retinol to accelerate cell turnover and bring fresh skin to the surface, and targeted brightening agents. The most effective brightening ingredients supported by dermatological research include niacinamide (vitamin B3 — inhibits melanin transfer), L-ascorbic acid (vitamin C — antioxidant and tyrosinase inhibitor), alpha arbutin (melanin production inhibitor), and tranexamic acid (reduces pigmentation pathways).<\u002Fp>\n      <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n        <span class=\"diam\"><\u002Fspan>\n        <div class=\"ptext\">Our <b>Dark Spot Serum<\u002Fb> is formulated specifically for post-inflammatory hyperpigmentation and uneven skin tone. Apply in the evening to affected areas before your moisturizer. Combine with daily SPF for maximum efficacy.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ACNE 1 -->\n<section data-section=\"Part 3 · Looks · Targeted Concerns\" data-topic=\"Acne\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Acne: Evidence-Based Treatment\" data-label=\"Acne · Mild &amp; Moderate\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Acne <span class=\"muted\">— evidence-based treatment<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">Acne results from a combination of excess sebum production, pore-clogging dead skin cells, bacterial overgrowth (C. acnes), and inflammation. Understanding the mechanism informs the treatment.<\u002Fp>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:2;margin-top:28px;\">\n      <div><div class=\"fi-label\">Mild acne<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Occasional breakouts, whiteheads, blackheads. A consistent skincare routine is often sufficient. Use a gentle cleanser twice daily (harsh cleansers strip the barrier and trigger rebound oil), a BHA (salicylic acid 2%) exfoliant 1–2x per week, niacinamide serum (regulates oil, reduces inflammation, improves barrier function), and a lightweight non-comedogenic moisturizer. Never skip moisturizer even if skin is oily — dehydrated oily skin produces even more oil to compensate.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\">Moderate acne<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Persistent breakouts, inflamed papules. Add a retinol or retinoid to your evening routine. Retinol increases cell turnover, preventing dead cells from clogging pores and reducing post-inflammatory marks. Start with a low concentration (0.3–0.5%) 2–3 times per week and build to nightly use over 4–6 weeks as your skin adapts. Benzoyl peroxide (2.5–5%) as a spot treatment kills acne-causing bacteria and is more effective at lower concentrations than higher ones (with less irritation).<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ACNE 2 -->\n<section data-section=\"Part 3 · Looks · Targeted Concerns\" data-topic=\"Acne\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Acne · Severe, Diet &amp; The Critical Rule\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <h2 class=\"mid\" data-anim=\"\">Severe acne, diet <span class=\"muted\">&amp; the critical rule<\u002Fspan><\u002Fh2>\n    <div class=\"feat\" data-anim=\"\" style=\"--d:1;margin-top:30px;\">\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Severe or persistent acne<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">If over-the-counter approaches do not show improvement after 8–12 weeks of consistent use, consult a dermatologist. Prescription options include tretinoin, topical or oral antibiotics, and isotretinoin (Accutane) for severe cystic acne. Do not attempt to self-treat severe acne — scarring is preventable with proper medical intervention.<\u002Fdiv><\u002Fdiv>\n      <div><div class=\"fi-label\" style=\"font-size:24px;\">Diet and acne<\u002Fdiv><div class=\"fi-body\" style=\"font-size:21px;\">Emerging research links high-glycemic diets (refined carbs, sugar) and excessive dairy intake to increased acne severity. While the evidence is not conclusive for all individuals, reducing processed sugar and monitoring dairy intake is a low-risk strategy. The nutrition protocol in Part 1 — whole foods, protein, and complex carbs — naturally supports clear skin.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:26px;border-width:1.8px;\">\n      <span class=\"diam\"><\u002Fspan>\n      <div class=\"ptext\"><b>Critical rule —<\u002Fb> never pick, squeeze, or pop pimples. This introduces bacteria deeper into the skin, increases inflammation, and dramatically increases the risk of permanent scarring and post-inflammatory hyperpigmentation. Use a spot treatment (benzoyl peroxide or salicylic acid) and let it resolve naturally.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HAIR LOSS -->\n<section data-section=\"Part 3 · Looks · Targeted Concerns\" data-topic=\"Hair Loss &amp; Thinning\" data-part=\"3\" data-partname=\"Looks\" data-label=\"Hair Loss &amp; Thinning\">\n  <div class=\"split\">\n    <div class=\"lt\">\n      <div class=\"kicker\" data-anim=\"\">Hair Loss &amp; Thinning<\u002Fdiv>\n      <h1 class=\"big\" data-anim=\"\" style=\"--d:1;margin-top:18px;\">Maintain early, <span class=\"muted\">not regrow late.<\u002Fspan><\u002Fh1>\n      <div class=\"statrow\" data-anim=\"\" style=\"--d:2;margin-top:38px;\">\n        <div><div class=\"sv\">30%<\u002Fdiv><div class=\"sl\">Of men affected by age 30<\u002Fdiv><\u002Fdiv>\n        <div><div class=\"sv\">3–6mo<\u002Fdiv><div class=\"sl\">Until visible results from daily serum use<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"col-text\" style=\"align-self:center;\">\n      <p class=\"bodytext\" data-anim=\"\" style=\"--d:1;max-width:58ch;\">Male pattern hair loss (androgenetic alopecia) affects roughly 30% of men by age 30 and 50% by age 50. It is driven by DHT (dihydrotestosterone) sensitivity at the hair follicle — DHT miniaturizes follicles over time. Early intervention is critical — it is far easier to maintain existing hair than to regrow lost hair. Evidence-based topical treatments include minoxidil (FDA-approved) and peptide-based growth factors. Additional strategies: daily scalp massage (4 minutes, moderate pressure), ensuring adequate zinc, biotin, iron, and vitamin D levels, reducing chronic stress, and avoiding harsh chemical treatments and excessive heat styling.<\u002Fp>\n      <div class=\"product\" data-anim=\"\" style=\"--d:2;margin-top:24px;\">\n        <span class=\"diam\"><\u002Fspan>\n        <div class=\"ptext\">Our <b>Peptide Hair Growth Serum<\u002Fb> delivers follicle-supporting peptides and growth factors directly to the scalp. Apply daily — part the hair, apply to the scalp, massage gently for 1–2 minutes. Consistency over months is essential because hair growth cycles are slow. Expect visible results in 3–6 months of daily use.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FACIAL LEANNESS -->\n<section data-section=\"Part 3 · Looks\" data-topic=\"Facial Leanness &amp; Definition\" data-theme=\"dark\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Body Composition &amp; Facial Leanness\" data-label=\"Facial Leanness &amp; Definition\">\n  <div class=\"body\" style=\"display:flex;flex-direction:column;justify-content:center;\">\n    <div class=\"kicker\" data-anim=\"\" style=\"color:#9b988f;\">Facial Leanness &amp; Definition<\u002Fdiv>\n    <h2 class=\"statement\" data-anim=\"\" style=\"--d:1;margin-top:22px;max-width:22ch;font-size:60px;\">There is no way to spot-reduce facial fat.<\u002Fh2>\n    <p class=\"bodytext\" data-anim=\"\" style=\"--d:2;margin-top:30px;max-width:84ch;color:#c9c6bd;\">Facial leanness and jawline definition are a direct function of overall body fat percentage. For most men, visible facial definition (jawline, cheekbones, under-eye area) appears between 10–15% body fat. The protocols in Foundation (nutrition, caloric deficit) and Gym (resistance training, cardio) are your primary tools. Additionally: reducing sodium intake to under 2,300 mg/day reduces facial water retention, staying consistently hydrated prevents the paradoxical puffiness from chronic mild dehydration, limiting alcohol eliminates its bloating and inflammatory effects, and optimizing sleep reduces cortisol-driven facial puffiness.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- GROOMING 1 -->\n<section data-section=\"Part 3 · Looks · Grooming\" data-topic=\"Grooming\" data-part=\"3\" data-partname=\"Looks\" data-menu=\"Grooming: Teeth, Brows, Nails, Scent\" data-label=\"Grooming · Teeth, Brows, Nails\">\n  <div class=\"body\">\n    <h2 class=\"mid\" data-anim=\"\">Grooming <span class=\"muted\">— the compounding details<\u002Fspan><\u002Fh2>\n    <p class=\"bodytext sm\" data-anim=\"\" style=\"--d:1;margin-top:14px;max-width:104ch;color:var(--grey-mid);\">These details may seem minor individually, but they compound into an overall impression of someone who pays attention to himself — and that signal is powerful in every context.<\u002Fp>\n    <div class=\"proto-list\" data-anim=\"\" style=\"--d:2;margin-top:26px;\">\n      <div class=\"proto-item\"><div class=\"proto-label\">Teeth<\u002Fdiv><div class=\"proto-body sm\">Brush twice daily with fluoride toothpaste (2 minutes each time — most people significantly under-brush), floss daily (non-negotiable for gum health and preventing bad breath), and use a tongue scraper each morning (the tongue harbors the majority of odor-causing bacteria). Consider hydrogen peroxide-based whitening strips every 3–6 months — a bright, even smile is consistently ranked among the top 3 most attractive features. Visit a dentist twice a year for professional cleaning and checkups.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Eyebrows<\u002Fdiv><div class=\"proto-body sm\">Clean up stray hairs between and below your brows weekly using tweezers. Male brows should look maintained but natural — never thin or overly shaped. A professional threading or wax session every 4–6 weeks establishes your natural shape; at-home maintenance is easy after that. Well-groomed brows frame the eyes and dramatically improve facial structure.<\u002Fdiv><\u002Fdiv>\n      <div class=\"proto-item\"><div class=\"proto-label\">Nails<\u002Fdiv><div class=\"proto-body sm\">Trim and file nails weekly. Keep cuticles pushed back after showering (use cuticle oil once a week if prone to hangnails). Dirty, overgrown, or bitten nails are always noticed in professional and social settings — particularly by women. Consider a clear matte coat if nails are un
