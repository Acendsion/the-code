 Isolate','https://acendsion.com/products/chocolate-whey-protein-isolate'],\n    ['Peptide Hair Growth Serum','https://acendsion.com/products/peptide-hair-growth-serum'],\n    ['Probiotic with Prebiotics','https://acendsion.com/products/probiotic-with-prebiotics'],\n    ['Peptide Eye-Gel Cream','https://acendsion.com/products/peptide-eye-gel-cream'],\n    ['Fruit Punch Pre-Workout','https://acendsion.com/products/fruit-punch-pre-workout'],\n    ['Male Hormone Support','https://acendsion.com/products/male-hormone-support'],\n    ['Creatine Monohydrate','https://acendsion.com/products/creatine-monohydrate'],\n    ['Complete Multivitamin','https://acendsion.com/products/complete-multivitamin'],\n    ['Peptide Face Serum','https://acendsion.com/products/peptide-face-serum'],\n    ['Dark Spot Serum','https://acendsion.com/products/dark-spot-serum'],\n    ['Liver Support','https://acendsion.com/products/liver-support']\n  ]; // longest names first so they win when one name is a prefix of another\n  const PROD_RE = new RegExp('('+PRODUCTS.map(p=>p[0].replace(/[-\\/\\\\^$*+?.()|[\\]{}]/g,'\\\\$&')).join('|')+')','g');\n  const PROD_URL = Object.fromEntries(PRODUCTS);\n  function linkProducts(root){\n    const skip = new Set(['A','SCRIPT','STYLE','BUTTON']);\n    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {\n      acceptNode(n){\n        if(!n.nodeValue){ return NodeFilter.FILTER_REJECT; }\n        PROD_RE.lastIndex=0; if(!PROD_RE.test(n.nodeValue)) return NodeFilter.FILTER_REJECT;\n        let p=n.parentNode; while(p && p!==root){ if(skip.has(p.nodeName)) return NodeFilter.FILTER_REJECT; p=p.parentNode; }\n        return NodeFilter.FILTER_ACCEPT;\n      }\n    });\n    const targets=[]; let t; while((t=walker.nextNode())) targets.push(t);\n    targets.forEach(node=>{\n      PROD_RE.lastIndex=0;\n      const text=node.nodeValue; let last=0, m; const frag=document.createDocumentFragment();\n      while((m=PROD_RE.exec(text))){\n        if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));\n        const a=document.createElement('a');\n        a.className='plink'; a.href=PROD_URL[m[0]]; a.target='_blank'; a.rel='noopener'; a.textContent=m[0];\n        frag.appendChild(a); last=m.index+m[0].length;\n      }\n      if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));\n      node.parentNode.replaceChild(frag,node);\n    });\n  }\n  sections.forEach(linkProducts);\n\n  /* ---- percentage count-up: wrap digits before % once, animate on enter ---- */\n  const PCT_RE = /(\\d+)(?=%)/g;\n  function wrapPct(root){\n    const skip = new Set(['SCRIPT','STYLE']);\n    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {\n      acceptNode(n){\n        if(!n.nodeValue) return NodeFilter.FILTER_REJECT;\n        PCT_RE.lastIndex=0; if(!PCT_RE.test(n.nodeValue)) return NodeFilter.FILTER_REJECT;\n        let p=n.parentNode; while(p && p!==root){ if(skip.has(p.nodeName)||(p.classList&&p.classList.contains('pct'))) return NodeFilter.FILTER_REJECT; p=p.parentNode; }\n        return NodeFilter.FILTER_ACCEPT;\n      }\n    });\n    const targets=[]; let t; while((t=walker.nextNode())) targets.push(t);\n    targets.forEach(node=>{\n      PCT_RE.lastIndex=0;\n      const text=node.nodeValue; let last=0, m; const frag=document.createDocumentFragment();\n      while((m=PCT_RE.exec(text))){\n        if(m.index>last) frag.appendChild(document.createTextNode(text.slice(last,m.index)));\n        const span=document.createElement('span');\n        span.className='pct'; span.dataset.final=m[0]; span.textContent=m[0];\n        frag.appendChild(span); last=m.index+m[0].length;\n      }\n      if(last<text.length) frag.appendChild(document.createTextNode(text.slice(last)));\n      node.parentNode.replaceChild(frag,node);\n    });\n  }\n  sections.forEach(wrapPct);\n\n  /* ---- draw-on borders: give every card/box a .cardline overlay; arm tables ---- */\n  sections.forEach(s=>{\n    s.querySelectorAll('.card, .numcard, .product, .contents-panel').forEach(c=>{\n      if(c.querySelector(':scope > .cardline')) return;\n      const line=document.createElement('span'); line.className='cardline';\n      c.appendChild(line);\n    });\n    s.querySelectorAll('table.t').forEach(t=>t.classList.add('t-anim'));\n  });\n\n  /* ---- reveal / animations on slide change (robust both directions) ---- */\n  const progress = document.getElementById('progress');\n  const navCount = document.getElementById('navCount');\n  function setCount(idx){\n    const name = groupName[idx];\n    navCount.innerHTML = 'Page '+groupPos[idx]+' of '+groupTotals[groupOf[idx]] +\n      (name ? ' <span class=\"nc-name\">— '+name+'<\u002Fspan>' : '');\n  }\n  const navGroup = document.getElementById('navGroup');\n  // Center the Contents+nav button group in the gap between the two header texts of the\n  // active slide. Horizontal edges come from the (horizontally stable) header text rects;\n  // vertical from the slide rect + scale, so it stays put during the entrance fade-up.\n  function positionNavGroup(active){\n    if(!active || !navGroup) return;\n    const sr = active.getBoundingClientRect();\n    if(!sr.width) return;\n    const scale = sr.width/1920;\n    const bar = active.querySelector('.topbar');\n    let cx;\n    if(bar){\n      const l = bar.querySelector('.tb-l'), r = bar.querySelector('.tb-r');\n      const lr = l.getBoundingClientRect(), rr = r.getBoundingClientRect();\n      cx = (lr.right + rr.left)/2;\n    } else {\n      cx = sr.left + sr.width/2;   // nobar slides (title/divider): center across the slide\n    }\n    navGroup.style.left = cx + 'px';\n    navGroup.style.top  = (sr.top + 71*scale) + 'px';\n  }\n  window.addEventListener('resize', ()=>positionNavGroup(sections[window.__cur||0]));\n\n  function onChange(idx, reason){\n    window.__cur = idx;\n    progress.style.width = ((idx+1)/total*100)+'%';\n    setCount(idx);\n    const active = sections[idx];\n    if(active){\n      // soft-UI chrome flips to its dark variant on dark slides, light variant otherwise\n      document.body.classList.toggle('chrome-dark', active.dataset.theme==='dark');\n      positionNavGroup(active);\n      if(reason && reason!=='init') runReveal(active); else primeStatic(active);\n    }\n  }\n  // initial slide (or print): everything in final, fully-visible state with no motion\n  function primeStatic(active){\n    active.querySelectorAll('.cardline').forEach(l=>l.classList.remove('draw'));\n    active.querySelectorAll('.pct').forEach(p=>{ p.textContent=p.dataset.final; });\n    active.querySelectorAll('[data-anim], .card, .numcard, .product, .contents-panel, hr.divider, .drawline, table.t thead tr')\n      .forEach(el=>{ try{ el.getAnimations().forEach(a=>a.cancel()); }catch(e){} el.style.opacity=''; el.style.transform=''; });\n  }\n  function countUp(el){\n    const final = parseInt(el.dataset.final,10); if(isNaN(final)) return;\n    const dur=900, t0=performance.now();\n    el.textContent='0';\n    function step(now){\n      const k=Math.min(1,(now-t0)/dur);\n      const e=1-Math.pow(1-k,3); // easeOutCubic\n      el.textContent=String(Math.round(final*e));\n      if(k<1) requestAnimationFrame(step); else el.textContent=String(final);\n    }\n    requestAnimationFrame(step);\n  }\n  const EASE='cubic-bezier(.2,.74,.28,1)';\n  function animate(el, frames, opt){\n    try{ el.getAnimations().forEach(a=>a.cancel()); }catch(e){}\n    try{ return el.animate(frames, opt); }catch(e){ el.style.opacity=''; el.style.transform=''; return null; }\n  }\n  function runReveal(active){\n    // 1) generic staggered fade-up for [data-anim] that aren't cards / card wrappers\n    active.querySelectorAll('[data-anim]').forEach(el=>{\n      if(el.matches('.card,.numcard,.product,.contents-panel')) return;          // cards handled in (2)\n      if(el.querySelector(':scope > .card, :scope > .numcard, :scope > .product, :scope > .contents-panel')){\n        animate(el,[{opacity:0},{opacity:1}],{duration:420,delay:70,easing:EASE,fill:'backwards'}); // wrapper: fade only\n        return;\n      }\n      const d=parseFloat(getComputedStyle(el).getPropertyValue('--d'))||0;\n      animate(el,[{opacity:0,transform:'translateY(26px)'},{opacity:1,transform:'translateY(0)'}],\n        {duration:560, delay:d*70, easing:EASE, fill:'backwards'});\n    });\n    // 2) cards: pronounced rise + border draw (the same signature the hover replays)\n    active.querySelectorAll('.card,.numcard,.product,.contents-panel').forEach((c,i)=>{\n      const delay=150+i*90;\n      animate(c,[{opacity:0,transform:'translateY(36px)'},{opacity:1,transform:'translateY(0)'}],\n        {duration:620, delay:delay, easing:EASE, fill:'backwards'});\n      const line=c.querySelector(':scope > .cardline');\n      if(line){ line.classList.remove('draw'); void line.offsetWidth; line.style.animationDelay=(delay+60)+'ms'; line.classList.add('draw'); }\n    });\n    // 3) top-left position pill draws its border like a card\n    const pillLine=active.querySelector('.topbar .pill > .cardline');\n    if(pillLine){ pillLine.classList.remove('draw'); void pillLine.offsetWidth; pillLine.style.animationDelay='130ms'; pillLine.classList.add('draw'); }\n    // 4) draw-on lines: hr.divider + .drawline (scaleX), and the table top line (width)\n    active.querySelectorAll('hr.divider, .drawline').forEach((ln,i)=>{\n      ln.style.transformOrigin='left center';\n      animate(ln,[{transform:'scaleX(0)'},{transform:'scaleX(1)'}],\n        {duration:680, delay:220+i*70, easing:EASE, fill:'backwards'});\n    });\n    active.querySelectorAll('table.t.t-anim thead tr').forEach(tr=>{\n      animate(tr,[{backgroundSize:'0% 1.4px'},{backgroundSize:'100% 1.4px'}],\n        {duration:760, delay:240, easing:EASE, fill:'backwards'});\n    });\n    // 5) percentage count-up\n    active.querySelectorAll('.pct').forEach(countUp);\n  }\n  deck.addEventListener('slidechange', e=> onChange(e.detail.index, e.detail.reason));\n  // robust init: set counter/progress for the initial slide WITHOUT hiding it\n  requestAnimationFrame(()=>requestAnimationFrame(()=>{\n    if(window.__cur===undefined){\n      const i = sections.findIndex(s=>s.hasAttribute('data-deck-active'));\n      onChange(i<0?0:i, 'init');\n    }\n  }));\n})();\n<\u002Fscript>\n\n\n\n\n<script id=\"m-mobile-js\">\n(function(){\n  var deck=document.querySelector('deck-stage');\n  if(!deck) return;\n  var MQ=window.matchMedia('(max-width:768px)');\n  var sections=Array.prototype.slice.call(deck.children).filter(function(n){return n.tagName==='SECTION';});\n\n  var SHADOW_CSS=[\n   '@media (max-width:768px){',\n   '  .stage{position:static !important;display:block !important;}',\n   '  .canvas{transform:none !important;width:100% !important;height:auto !important;background:transparent !important;}',\n   '  .overlay{display:none !important;}',\n   '  ::slotted(section[data-deck-active]){',\n   '    position:relative !important;inset:auto !important;width:100% !important;height:auto !important;',\n   '    min-height:100vh !important;min-height:100dvh !important;overflow:visible !important;',\n   '    display:flex !important;flex-direction:column !important;gap:var(--m-gap,24px) !important;',\n   '    padding:calc(var(--m-head,50px) + var(--m-edge,40px)) var(--m-pad,20px) 0 !important;',\n   '  }',\n   '}'\n  ].join('\\n');\n\n  function injectShadow(){\n    var sr=deck.shadowRoot;\n    if(!sr){ requestAnimationFrame(injectShadow); return; }\n    if(sr.getElementById('m-shadow-style')) return;\n    var st=document.createElement('style');\n    st.id='m-shadow-style';\n    st.textContent=SHADOW_CSS;\n    sr.appendChild(st);\n  }\n  injectShadow();\n\n  /* tap-to-play hover animation on touch, self-clearing so it never sticks */\n  var TAP_SEL='.card,.numcard,.product,.contents-panel,.topbar .pill,.menu-toggle,.botbar button';\n  function clearTaps(){ document.querySelectorAll('.m-tap').forEach(function(el){ el.classList.remove('m-tap'); }); }\n  var tapTimer;\n  document.addEventListener('touchstart',function(e){\n    var el=e.target.closest && e.target.closest(TAP_SEL);\n    if(!el) return;\n    clearTimeout(tapTimer); clearTaps();\n    el.classList.add('m-tap');\n  },{passive:true});\n  function releaseTap(){ clearTimeout(tapTimer); tapTimer=setTimeout(clearTaps,1100); }\n  document.addEventListener('touchend',releaseTap,{passive:true});\n  document.addEventListener('touchcancel',clearTaps,{passive:true});\n  document.addEventListener('scroll',clearTaps,{passive:true,capture:true});\n\n  function up(v){ return (v||'').trim(); }\n  sections.forEach(function(s){\n    var sec=up(s.dataset.section), top=up(s.dataset.topic),\n        part=up(s.dataset.partname), label=up(s.dataset.label);\n    var text=(sec&&top)?(sec+' '+top):(sec||part||label||top||'');\n    /* skip the breadcrumb on data-nobar slides (title + section dividers) — their big\n       heading already names the part, so the crumb would just duplicate it */\n    if(text && !s.hasAttribute('data-nobar') && !s.querySelector(':scope > .m-crumb')){\n      var c=document.createElement('div');\n      c.className='m-crumb';\n      c.textContent=text.toUpperCase();\n      s.insertBefore(c,s.firstChild);\n    }\n    if(!s.querySelector(':scope > .m-footer')){\n      /* flexible spacer keeps the footer pinned to the bottom of the slide */\n      if(!s.querySelector(':scope > .m-footspace')){\n        var sp=document.createElement('div');\n        sp.className='m-footspace';\n        sp.setAttribute('aria-hidden','true');\n        s.appendChild(sp);\n      }\n      var f=document.createElement('div');\n      f.className='m-footer';\n      f.textContent='\\u00A9 2026 ACENDSION \\u00B7 THE CODE';\n      s.appendChild(f);\n    }\n    s.querySelectorAll('table.t').forEach(function(t){\n      var p=t.parentNode;\n      if(p&&p.classList&&p.classList.contains('m-tablewrap')) return;\n      var w=document.createElement('div'); w.className='m-tablewrap';\n      p.insertBefore(w,t); w.appendChild(t);\n    });\n  });\n\n  deck.addEventListener('slidechange',function(){\n    if(MQ.matches){ try{ deck.scrollTop=0; }catch(e){} }\n  });\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
